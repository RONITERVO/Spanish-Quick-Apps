<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05070a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Exploración táctil, visual y sonora de la cultura: del conocimiento compartido a la comunicación, las herramientas, las ciudades, la ciencia y la civilización planetaria.">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Espectro de la Cultura: del Conocimiento Compartido a la Civilización</title>
  <style>
    :root {
      --accent: 255 211 137;
      --accent-soft: rgb(var(--accent) / .34);
      --ink: 255 255 255;
      --panel: 8 9 14;
      --scan-x: 50vw;
      --scan-y: 93vh;
      --progress: 2%;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: #05070a;
    }

    body {
      position: fixed;
      inset: 0;
      color: rgb(var(--ink));
      font-family: Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #culture-spectrum {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      outline: none;
    }

    #light-field,
    #scan-line,
    #grain,
    #vignette,
    #top-bloom,
    #bottom-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #light-field {
      z-index: 2;
      opacity: 0;
      transition: opacity 180ms ease;
      background: radial-gradient(circle at var(--scan-x) var(--scan-y), rgb(var(--accent) / .56) 0, rgb(var(--accent) / .15) 11%, transparent 35%);
      mix-blend-mode: screen;
    }
    body.active #light-field { opacity: .82; }

    #scan-line {
      z-index: 3;
      opacity: 0;
      transition: opacity 150ms ease;
      background:
        linear-gradient(90deg, transparent calc(var(--scan-x) - 1px), rgb(var(--accent) / .52) var(--scan-x), transparent calc(var(--scan-x) + 1px)),
        linear-gradient(180deg, transparent calc(var(--scan-y) - 1px), rgb(var(--accent) / .32) var(--scan-y), transparent calc(var(--scan-y) + 1px));
      mix-blend-mode: screen;
    }
    body.active #scan-line { opacity: .17; }

    #grain {
      z-index: 4;
      opacity: .042;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    #vignette {
      z-index: 5;
      background:
        radial-gradient(ellipse at center, transparent 38%, rgb(0 0 0 / .22) 72%, rgb(0 0 0 / .84) 128%),
        linear-gradient(90deg, rgb(0 0 0 / .47), transparent 13%, transparent 87%, rgb(0 0 0 / .45));
    }

    #top-bloom {
      z-index: 1;
      opacity: .5;
      background: radial-gradient(ellipse at 50% -10%, rgb(255 243 216 / .34), transparent 49%);
      mix-blend-mode: screen;
    }

    #bottom-glow {
      z-index: 1;
      opacity: .46;
      background: radial-gradient(ellipse at 50% 110%, rgb(255 173 92 / .24), transparent 48%);
      mix-blend-mode: screen;
    }

    #readout {
      position: fixed;
      z-index: 9;
      left: 50%;
      top: 49%;
      width: min(92vw, 860px);
      padding: clamp(15px, 3.2vw, 27px) clamp(19px, 5vw, 52px) clamp(18px, 3.7vw, 33px);
      border: 1px solid rgb(255 255 255 / .22);
      border-radius: clamp(25px, 6vw, 52px);
      color: white;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      filter: blur(14px);
      transform: translate(-50%, -50%) scale(.7);
      background:
        linear-gradient(145deg, rgb(255 255 255 / .12), transparent 56%),
        rgb(var(--panel) / .66);
      box-shadow:
        0 24px 80px rgb(0 0 0 / .58),
        0 0 86px var(--accent-soft),
        inset 0 1px 0 rgb(255 255 255 / .26),
        inset 0 -1px 0 rgb(0 0 0 / .25);
      backdrop-filter: blur(23px) saturate(1.36);
      -webkit-backdrop-filter: blur(23px) saturate(1.36);
      transition:
        opacity 170ms ease,
        filter 240ms ease,
        transform 410ms cubic-bezier(.16, 1, .3, 1),
        box-shadow 140ms linear;
      will-change: opacity, filter, transform;
    }

    #readout.visible {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -50%) scale(1);
    }

    #evidence-class {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 27px;
      margin-bottom: clamp(9px, 2vw, 15px);
      padding: 6px 13px 7px;
      border: 1px solid rgb(var(--accent) / .62);
      border-radius: 999px;
      color: rgb(var(--accent));
      font-size: clamp(.62rem, 2.1vw, .87rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .16em;
      text-transform: uppercase;
      background: rgb(var(--accent) / .09);
      box-shadow: 0 0 25px var(--accent-soft), inset 0 1px 0 rgb(255 255 255 / .1);
    }

    #zone-name {
      display: block;
      margin: 0;
      font-size: clamp(2rem, 8.5vw, 6.8rem);
      font-weight: 950;
      line-height: .86;
      letter-spacing: -.058em;
      word-spacing: .1em;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: 0 0 30px var(--accent-soft), 0 5px 24px rgb(0 0 0 / .5);
    }
    #zone-name.compact { font-size: clamp(1.7rem, 7.15vw, 5.55rem); letter-spacing: -.046em; line-height: .9; }
    #zone-name.long { font-size: clamp(1.38rem, 5.9vw, 4.45rem); letter-spacing: -.034em; line-height: .94; }

    #feature-name {
      display: block;
      margin-top: clamp(8px, 1.8vw, 14px);
      font-size: clamp(.9rem, 3.2vw, 1.62rem);
      font-weight: 880;
      line-height: 1.08;
      letter-spacing: .105em;
      text-transform: uppercase;
    }

    #metric {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      margin-top: clamp(10px, 2vw, 17px);
      padding: 7px 13px 8px;
      border: 1px solid rgb(255 255 255 / .18);
      border-radius: 999px;
      font-size: clamp(.67rem, 2.2vw, .92rem);
      font-weight: 820;
      line-height: 1.12;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: rgb(0 0 0 / .2);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / .11);
    }

    #fact {
      display: block;
      max-width: 700px;
      margin: clamp(10px, 2.25vw, 17px) auto 0;
      font-size: clamp(.82rem, 2.63vw, 1.1rem);
      font-weight: 600;
      line-height: 1.42;
      letter-spacing: .005em;
      color: rgb(255 255 255 / .91);
      text-wrap: pretty;
    }

    #touch-orb {
      position: fixed;
      z-index: 8;
      left: 50%;
      top: 93%;
      width: clamp(58px, 15vw, 104px);
      aspect-ratio: 1;
      border: 1px solid rgb(var(--accent) / .82);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.4);
      background: radial-gradient(circle, rgb(255 255 255 / .82) 0 2%, rgb(var(--accent) / .34) 7%, rgb(var(--accent) / .09) 36%, transparent 70%);
      box-shadow: 0 0 18px rgb(var(--accent) / .58), 0 0 62px rgb(var(--accent) / .42), inset 0 0 26px rgb(var(--accent) / .19);
      transition: opacity 150ms ease, transform 260ms cubic-bezier(.16, 1, .3, 1);
    }
    #touch-orb.visible { opacity: .9; transform: translate(-50%, -50%) scale(1); }

    #journey-scale {
      position: fixed;
      z-index: 7;
      right: max(10px, env(safe-area-inset-right));
      top: max(19px, env(safe-area-inset-top));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: clamp(50px, 10vw, 78px);
      pointer-events: none;
      opacity: .58;
      transition: opacity 180ms ease;
    }
    body.active #journey-scale { opacity: .9; }

    #scale-track {
      position: absolute;
      right: 11px;
      top: 48px;
      bottom: 48px;
      width: 3px;
      border-radius: 999px;
      overflow: hidden;
      background: rgb(255 255 255 / .14);
      box-shadow: 0 0 12px rgb(0 0 0 / .5);
    }
    #scale-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--progress);
      border-radius: inherit;
      background: linear-gradient(to top, rgb(94 214 164 / .68), rgb(var(--accent)));
      box-shadow: 0 0 14px rgb(var(--accent) / .72);
    }
    #scale-dot {
      position: absolute;
      right: 6px;
      bottom: 48px;
      width: 13px;
      height: 13px;
      border: 2px solid rgb(255 255 255 / .84);
      border-radius: 50%;
      transform: translateY(50%);
      background: rgb(var(--accent));
      box-shadow: 0 0 17px rgb(var(--accent) / .85);
    }
    #scale-bottom,
    #scale-top {
      position: absolute;
      right: 0;
      width: 74px;
      font-size: clamp(.49rem, 1.6vw, .61rem);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: .11em;
      text-align: right;
      text-transform: uppercase;
      color: rgb(255 255 255 / .65);
    }
    #scale-top { top: 0; }
    #scale-bottom { bottom: 0; }
    #scale-value {
      position: absolute;
      right: 25px;
      top: 50%;
      width: min(34vh, 250px);
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: right center;
      font-size: clamp(.54rem, 1.7vw, .66rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .14em;
      text-align: center;
      text-transform: uppercase;
      color: rgb(var(--accent));
      text-shadow: 0 0 14px rgb(var(--accent) / .6);
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      z-index: 6;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
      width: min(78vw, 530px);
      transform: translateX(-50%);
      color: rgb(255 255 255 / .78);
      text-align: center;
      pointer-events: none;
      font-size: clamp(.7rem, 2.4vw, .94rem);
      font-weight: 800;
      line-height: 1.34;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-shadow: 0 2px 16px rgb(0 0 0 / .8);
      animation: breathe 3.2s ease-in-out infinite;
    }
    #hint strong { color: rgb(var(--accent)); }

    .ripple {
      position: fixed;
      z-index: 7;
      width: 20px;
      height: 20px;
      border: 1px solid rgb(var(--accent) / .78);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 22px rgb(var(--accent) / .52), inset 0 0 15px rgb(var(--accent) / .2);
      animation: ripple 920ms cubic-bezier(.16, 1, .3, 1) forwards;
    }

    @keyframes ripple { to { width: min(72vw, 560px); height: min(72vw, 560px); opacity: 0; } }
    @keyframes breathe {
      0%, 100% { opacity: .4; transform: translateX(-50%) translateY(0); }
      50% { opacity: .95; transform: translateX(-50%) translateY(-3px); }
    }

    @media (max-height: 620px) {
      #readout { width: min(88vw, 760px); padding-top: 12px; padding-bottom: 14px; }
      #evidence-class { margin-bottom: 7px; }
      #fact { margin-top: 8px; line-height: 1.32; }
      #metric { margin-top: 7px; }
      #journey-scale { opacity: .46; }
    }

    @media (max-width: 460px) {
      #readout { width: 91vw; }
      #journey-scale { right: 3px; }
      #scale-value { display: none; }
      #scale-bottom, #scale-top { width: 54px; font-size: .45rem; }
      #hint { width: 72vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      #hint { animation: none; }
      .ripple { animation-duration: 1ms; }
      #readout, #touch-orb, #light-field, #scan-line { transition-duration: 1ms; }
    }
  </style>
</head>
<body>
  <canvas id="culture-spectrum" tabindex="0" role="application" aria-label="Exploración táctil de la cultura, desde el conocimiento compartido en la parte inferior hasta la civilización planetaria en la parte superior. Toca, arrastra o usa las flechas del teclado."></canvas>
  <div id="top-bloom" aria-hidden="true"></div><div id="bottom-glow" aria-hidden="true"></div><div id="light-field" aria-hidden="true"></div><div id="scan-line" aria-hidden="true"></div><div id="grain" aria-hidden="true"></div><div id="vignette" aria-hidden="true"></div>
  <div id="hint" aria-hidden="true"><strong>Toca y asciende</strong> · del conocimiento a la civilización</div>
  <div id="readout" aria-live="polite" aria-atomic="true"><span id="evidence-class"></span><strong id="zone-name"></strong><span id="feature-name"></span><span id="metric"></span><span id="fact"></span></div>
  <div id="touch-orb" aria-hidden="true"></div>
  <div id="journey-scale" aria-hidden="true"><span id="scale-top">Civilización planetaria</span><div id="scale-track"><div id="scale-fill"></div></div><div id="scale-dot"></div><span id="scale-value">Conocimiento compartido</span><span id="scale-bottom">Conocimiento compartido</span></div>

  <!--
    Visualización educativa conceptual, táctil y sin dependencias externas.

    La escala vertical representa aumento de alcance, acumulación y coordinación cultural, no una escalera
    universal de superioridad. Las sociedades pueden resolver problemas semejantes de formas distintas;
    agricultura, escritura, ciudades, industria y conectividad no forman una trayectoria única, obligatoria
    ni irreversible. Las regiones se superponen y las prácticas antiguas continúan dentro de sistemas modernos.

    No se afirma que sociedades sin escritura carezcan de conocimiento complejo, que la agricultura mejorara
    inmediatamente toda vida, que instituciones sirvan por igual a todas las personas, que tecnología determine
    por sí sola el cambio social ni que la conectividad global haya eliminado la diversidad cultural.

    "Civilización planetaria" describe una red de sociedades interdependientes capaz de transformar sistemas
    terrestres. No implica unidad política, acceso igual, coordinación completa ni una definición universal de
    civilización. Los elementos visuales son metáforas interactivas, no reconstrucciones históricas literales.
  -->

  <script>
  (() => {
    "use strict";

    const scaleDot = document.getElementById("scale-dot");
    const hint = document.getElementById("hint");

    const TAU = Math.PI * 2;
    const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const mix = (a, b, t) => a + (b - a) * t;
    const smooth = t => t * t * (3 - 2 * t);
    const fract = v => v - Math.floor(v);
    const seeded = n => fract(Math.sin(n * 127.1 + 311.7) * 43758.5453123);
    const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

    const ZONES = [{"id":"shared-knowledge","name":"El conocimiento compartido","className":"Memoria colectiva acumulativa","color":[255,211,137],"metric":"Experiencia + símbolos + enseñanza + corrección → conocimiento público","fact":"Compartir información no garantiza que sea verdadera, pero permite conservarla, compararla, corregirla y ampliarla.","sound":{"base":58.0,"filter":760,"noise":0.018,"pulse":0.07,"type":"sine"},"features":[["símbolos compartidos","Los símbolos permiten que varias personas señalen una misma idea sin depender del objeto presente."],["memoria externa","Diagramas, marcas, objetos y relatos conservan información fuera de una sola mente."],["enseñanza","Una habilidad puede transmitirse deliberadamente en lugar de redescubrirse desde cero."],["corrección colectiva","Otras personas pueden comprobar, discutir y modificar una afirmación."],["historias","Los relatos organizan experiencias y conectan acontecimientos separados."],["instrucciones","Una secuencia de acciones puede conservarse y repetirse por personas ausentes."],["descubrimientos","Una idea útil puede incorporarse al repertorio de toda una comunidad."],["conocimiento provisional","Lo compartido puede mejorar, pero también puede contener errores, sesgos y olvidos."]],"p0":0.0,"p1":0.05,"scene":0},{"id":"communication","name":"Comunicación","className":"Transferencia social anterior a la escritura","color":[109,220,255],"metric":"Señal + contexto + atención mutua → mensaje interpretado","fact":"La comunicación puede usar voz, gesto, mirada, ritmo, olor, postura o movimiento; no requiere escritura ni lenguaje hablado completo.","sound":{"base":62.1,"filter":865,"noise":0.023,"pulse":0.10500000000000001,"type":"triangle"},"features":[["gesto","Las manos y el cuerpo pueden indicar dirección, tamaño, intención o emoción."],["señal","Una señal adquiere significado cuando emisor y receptor relacionan su forma con una situación."],["voz","La voz transmite palabras, ritmo, urgencia, identidad     function sceneSettlement(z,time){const s=Math.min(width,height),ground=height*.73;line(0,ground,width,ground,rgba([244,222,185],.28),2);for(let i=0;i<8;i++){const x=width*(.08+i*.12),w=s*(.09+(i%3)*.015),h=s*(.1+(i%2)*.02);drawHouse(x,ground-h*.35,w,h,i%2?rgba(z.color,.58):'rgba(255,234,198,.53)');}ctx.strokeStyle=rgba([218,188,135],.22);ctx.lineWidth=s*.035;ctx.beginPath();ctx.moveTo(width*.48,height);ctx.bezierCurveTo(width*.42,height*.82,width*.57,height*.65,width*.5,height*.46);ctx.stroke();circle(width*.5,height*.44,s*.018,rgba([255,176,81],.75));}
    function sceneWriting(z,time){const s=Math.min(width,height),x=width*.5,y=height*.5,w=s*.48,h=s*.58;ctx.fillStyle='rgba(25,18,14,.24)';ctx.strokeStyle=rgba(z.color,.55);ctx.lineWidth=2;roundedRectPath(x-w*.5,y-h*.5,w,h,12);ctx.fill();ctx.stroke();ctx.save();ctx.beginPath();roundedRectPath(x-w*.48,y-h*.47,w*.96,h*.94,10);ctx.clip();for(let i=0;i<36;i++){const g=glyphs[i],gx=x-w*.42+(i%6)*w*.165,gy=y-h*.38+Math.floor(i/6)*h*.15;ctx.font=`700 ${s*.035}px serif`;ctx.textAlign='center';ctx.fillStyle=i%5?rgba(z.color,.52):'rgba(255,246,220,.72)';ctx.fillText(g.char,gx,gy+Math.sin(time*.5+g.phase)*2);}ctx.restore();}
    function sceneCity(z,time){const s=Math.min(width,height),ground=height*.8;const grad=ctx.createLinearGradient(0,height*.2,0,ground);grad.addColorStop(0,rgba(z.color,.04));grad.addColorStop(1,rgba(z.color,.18));ctx.fillStyle=grad;ctx.fillRect(0,height*.15,width,ground-height*.15);for(let i=0;i<16;i++){const st=structures[i],x=i/15*width,w=s*(.035+(i%4)*.012),h=s*(.11+(i%7)*.045);ctx.fillStyle=i%3?rgba([22,24,31],.62):rgba(z.color,.14);ctx.strokeStyle=rgba(z.color,.22+(i%3)*.07);ctx.lineWidth=1.2;ctx.fillRect(x-w*.5,ground-h,w,h);ctx.strokeRect(x-w*.5,ground-h,w,h);for(let r=0;r<Math.floor(h/(s*.04));r++)for(let c=0;c<2;c++)circle(x+(c-.5)*w*.35,ground-h+s*.025+r*s*.04,1.4,(r+c+i)%4?'rgba(255,214,123,.35)':'rgba(120,210,255,.35)');}ctx.strokeStyle='rgba(255,255,255,.11)';ctx.lineWidth=s*.03;ctx.beginPath();ctx.moveTo(width*.5,height);ctx.lineTo(width*.46,ground);ctx.stroke();}
    function sceneInstitutions(z,time){const s=Math.min(width,height),cx=width*.5,base=height*.7,w=s*.5,h=s*.34;ctx.strokeStyle=rgba(z.color,.62);ctx.fillStyle='rgba(5,10,22,.22)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-w*.55,base-h*.72);ctx.lineTo(cx,base-h);ctx.lineTo(cx+w*.55,base-h*.72);ctx.closePath();ctx.fill();ctx.stroke();for(let i=0;i<7;i++){const x=cx-w*.42+i*w*.14;ctx.fillStyle=rgba(z.color,.14);ctx.fillRect(x-s*.025,base-h*.68,s*.05,h*.65);ctx.strokeRect(x-s*.025,base-h*.68,s*.05,h*.65);}line(cx-w*.54,base,cx+w*.54,base,rgba(z.color,.62),4);for(let i=0;i<8;i++){const a=i/8*TAU+time*.01,x=cx+Math.cos(a)*s*.35,y=height*.34+Math.sin(a)*s*.12;circle(x,y,3+i%2,rgba(i%3?z.color:[255,244,218],.6));line(x,y,cx,base-h*.65,rgba(z.color,.09));}}
    function sceneCommerce(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.5;ctx.strokeStyle=rgba(z.color,.22);ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(cx,cy,s*.33,s*.25,0,0,TAU);ctx.stroke();for(let i=0;i<12;i++){const a=i/12*TAU,x=cx+Math.cos(a)*s*.33,y=cy+Math.sin(a)*s*.25;circle(x,y,3+i%3,rgba(i%2?z.color:[255,229,171],.7));const j=(i*5+3)%12,a2=j/12*TAU,x2=cx+Math.cos(a2)*s*.33,y2=cy+Math.sin(a2)*s*.25;ctx.strokeStyle=rgba(z.color,.15);ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(cx+Math.sin(a+i)*s*.12,cy+Math.cos(a-i)*s*.08,x2,y2);ctx.stroke();}for(let i=0;i<7;i++){const a=i/7*TAU+time*.08,x=cx+Math.cos(a)*s*.22,y=cy+Math.sin(a)*s*.16;circle(x,y,2.8,rgba([255,242,197],.8));}}
    function sceneScience(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.52;for(let r=0;r<5;r++){ctx.strokeStyle=rgba(r%2?z.color:[255,245,214],.13+r*.035);ctx.lineWidth=1.2;ctx.beginPath();ctx.ellipse(cx,cy,s*(.08+r*.047),s*(.04+r*.022),r*.55+time*.02,0,TAU);ctx.stroke();}circle(cx,cy,s*.035,rgba([255,246,212],.82));for(let i=0;i<9;i++){const a=i/9*TAU+time*.16,r=s*(.11+(i%3)*.055),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r*.55;circle(x,y,2+i%3,rgba(z.color,.75));}const gx=width*.1,gy=height*.18,gw=width*.25,gh=height*.2;line(gx,gy+gh,gx+gw,gy+gh,'rgba(255,255,255,.28)',1.5);line(gx,gy,gx,gy+gh,'rgba(255,255,255,.28)',1.5);ctx.strokeStyle=rgba(z.color,.7);ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<=30;i++){const x=gx+i/30*gw,y=gy+gh*(.75-.55/(1+Math.exp(-(i-15)/4)))+Math.sin(i*.7)*3;if(!i)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
    function sceneIndustry(z,time){const s=Math.min(width,height),ground=height*.77;ctx.fillStyle='rgba(13,15,18,.64)';for(let i=0;i<7;i++){const x=width*(.08+i*.14),w=s*.09,h=s*(.12+(i%3)*.07);ctx.fillRect(x-w*.5,ground-h,w,h);ctx.strokeStyle=rgba(z.color,.28);ctx.strokeRect(x-w*.5,ground-h,w,h);}for(let i=0;i<3;i++){const x=width*(.2+i*.27);ctx.fillRect(x,ground-s*.34,s*.045,s*.34);const smokeY=ground-s*.35;for(let k=0;k<5;k++)circle(x+s*.022+Math.sin(time*.4+k)*s*.02,smokeY-k*s*.045,s*(.018+k*.004),rgba([210,210,210],.06+k*.015));}drawGear(width*.43,height*.58,s*.115,14,rgba(z.color,.6));drawGear(width*.61,height*.61,s*.08,11,rgba([255,224,175],.48));for(let i=0;i<8;i++)line(i/7*width,ground+s*.04,(i+1)/7*width,ground+s*.04,rgba([255,205,95],.24),4);}
    function sceneGlobal(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.5,r=s*.31;softHalo(cx,cy,r*1.8,z.color,.15);ctx.strokeStyle=rgba(z.color,.35);ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.stroke();for(let lat=-2;lat<=2;lat++){ctx.beginPath();ctx.ellipse(cx,cy,r*Math.cos(lat*.24),r*.28*Math.cos(lat*.24),0,0,TAU);ctx.strokeStyle=rgba(z.color,.12);ctx.stroke();}for(let lon=0;lon<7;lon++){ctx.beginPath();ctx.ellipse(cx,cy,r*.28,r,lon/7*TAU,0,TAU);ctx.strokeStyle=rgba(z.color,.11);ctx.stroke();}const pts=[];for(let i=0;i<22;i++){const a=seeded(i+50)*TAU,rr=Math.sqrt(seeded(i+90))*r*.92,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.74;pts.push([x,y]);circle(x,y,2+i%3,rgba(i%4?z.color:[255,240,205],.72));}for(let i=0;i<28;i++){const a=pts[i%pts.length],b=pts[(i*7+5)%pts.length];ctx.strokeStyle=rgba(z.color,.09+(i%4)*.025);ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.quadraticCurveTo(cx+Math.sin(i)*r*.2,cy+Math.cos(i)*r*.15,b[0],b[1]);ctx.stroke();}for(let i=0;i<5;i++){const a=time*.08+i/5*TAU,x=cx+Math.cos(a)*r*1.23,y=cy+Math.sin(a)*r*.52;circle(x,y,3,rgba([255,245,220],.75));line(x,y,cx+Math.cos(a)*r,cy+Math.sin(a)*r*.74,rgba(z.color,.17));}}
    function scenePlanetary(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.52,r=s*.27;softHalo(cx,cy,r*2.2,z.color,.22);const g=ctx.createRadialGradient(cx-r*.35,cy-r*.42,r*.05,cx,cy,r);g.addColorStop(0,'rgba(190,245,255,.98)');g.addColorStop(.43,'rgba(68,169,220,.92)');g.addColorStop(1,'rgba(12,44,95,.96)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.fill();ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.clip();ctx.fillStyle='rgba(88,184,115,.68)';for(let i=0;i<11;i++){const a=seeded(i+300)*TAU,rr=seeded(i+330)*r*.75,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.8;ctx.beginPath();ctx.ellipse(x,y,r*(.07+seeded(i+350)*.13),r*(.025+seeded(i+370)*.07),a,0,TAU);ctx.fill();}ctx.strokeStyle='rgba(255,255,255,.17)';for(let i=0;i<7;i++){ctx.beginPath();ctx.arc(cx-r*.2+i*r*.07,cy-r*.1+i*r*.03,r*(.5+i*.05),.2,2.5);ctx.stroke();}ctx.restore();ctx.strokeStyle='rgba(180,238,255,.52)';ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.stroke();for(let i=0;i<26;i++){const a=i/26*TAU+time*.012,x=cx+Math.cos(a)*r*.82,y=cy+Math.sin(a)*r*.82;circle(x,y,1.7+i%3,rgba(i%4?z.color:[255,240,185],.42));}for(let i=0;i<4;i++){const a=time*(.07+i*.012)+i*TAU/4,rr=r*(1.33+i*.11),x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.62;circle(x,y,3+i,rgba([255,247,218],.78));line(x,y,cx+Math.cos(a)*r,cy+Math.sin(a)*r*.62,rgba(z.color,.16));}ctx.font=`800 ${s*.028}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillText('TECNOLOGÍA · INFORMACIÓN · ENERGÍA · FUTUROS',cx,height*.91);}

    const SCENES=[sceneShared,sceneCommunication,sceneLanguage,sceneStories,sceneTeaching,sceneCooperation,sceneNorms,sceneTools,sceneArt,sceneExchange,sceneAgriculture,sceneSettlement,sceneWriting,sceneCity,sceneInstitutions,sceneCommerce,sceneScience,sceneIndustry,sceneGlobal,scenePlanetary];
    function zoneWeight(progress,p0,p1,feather=.035){const enter=smooth(clamp((progress-(p0-feather))/feather,0,1)),exit=1-smooth(clamp((progress-p1)/feather,0,1));return enter*exit;}
    function drawScene(progress,time){for(const z of ZONES){const alpha=zoneWeight(progress,z.p0,z.p1,.036);if(alpha<.003)continue;ctx.save();ctx.globalAlpha=alpha;SCENES[z.scene](z,time);ctx.restore();}}
    function drawBursts(dt){for(let i=bursts.length-1;i>=0;i--){const p=bursts[i];p.life-=dt*p.decay;if(p.life<=0){bursts.splice(i,1);continue}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.94,dt*60);p.vy*=Math.pow(.94,dt*60);circle(p.x,p.y,p.r*(.5+p.life),rgba(p.color,p.life*.55));}for(let i=waves.length-1;i>=0;i--){const w=waves[i];w.life-=dt*1.05;if(w.life<=0){waves.splice(i,1);continue}w.radius+=dt*Math.min(width,height)*.24;ctx.strokeStyle=rgba(w.color,w.life*.25);ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(w.x,w.y,w.radius,0,TAU);ctx.stroke();}}

    function render(now){const dt=Math.min(.04,Math.max(.001,(now-lastFrame)/1000));lastFrame=now;elapsed+=reducedMotion?dt*.24:dt;pointerX+=(targetX-pointerX)*(1-Math.pow(.001,dt));pointerY+=(targetY-pointerY)*(1-Math.pow(.001,dt));currentProgress+=(depthFromY(pointerY)-currentProgress)*(1-Math.pow(.005,dt));shownX+=(pointerX*width-shownX)*(1-Math.pow(.001,dt));shownY+=(pointerY*height-shownY)*(1-Math.pow(.001,dt));touchEnergy*=Math.pow(.075,dt);
      drawBackground(currentProgress,elapsed);drawScene(currentProgress,elapsed);drawBursts(dt);if(!pointerDown)setAccent(zoneForDepth(currentProgress));requestAnimationFrame(render);}
    window.addEventListener('resize',resize,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(resize,120),{passive:true});document.addEventListener('visibilitychange',()=>{if(document.hidden&&audioCtx&&audioCtx.state==='running')audioCtx.suspend().catch(()=>{});});
    resize();setAccent(ZONES[0]);requestAnimationFrame(render);
  })();
