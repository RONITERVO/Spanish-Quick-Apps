<!doctype html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#03070a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Exploración táctil, visual y sonora de la historia de la vida: del umbral de la primera célula a cerebros, percepción y experiencia consciente.">
  <meta name="application-name" content="Espectro de la Vida: de la Primera Célula a la Conciencia">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta property="og:title" content="Espectro de la Vida">

  <title>Espectro de la Vida: de la Primera Célula a la Conciencia</title>
  <style>
    :root {
      --accent: 111 255 190;
      --accent-soft: rgb(var(--accent) / .34);
      --ink: 255 255 255;
      --panel: 3 8 10;
      --scan-x: 50vw;
      --scan-y: 93vh;
      --progress: 2%;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: #020506;
    }

    body {
      position: fixed;
      inset: 0;
      color: rgb(var(--ink));
      font-family: Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #life-spectrum {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      outline: none;
    }

    #light-field,
    #scan-line,
    #grain,
    #vignette,
    #top-bloom,
    #bottom-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #light-field {
      z-index: 2;
      opacity: 0;
      transition: opacity 180ms ease;
      background: radial-gradient(circle at var(--scan-x) var(--scan-y), rgb(var(--accent) / .56) 0, rgb(var(--accent) / .15) 11%, transparent 35%);
      mix-blend-mode: screen;
    }
    body.active #light-field { opacity: .82; }

    #scan-line {
      z-index: 3;
      opacity: 0;
      transition: opacity 150ms ease;
      background:
        linear-gradient(90deg, transparent calc(var(--scan-x) - 1px), rgb(var(--accent) / .52) var(--scan-x), transparent calc(var(--scan-x) + 1px)),
        linear-gradient(180deg, transparent calc(var(--scan-y) - 1px), rgb(var(--accent) / .32) var(--scan-y), transparent calc(var(--scan-y) + 1px));
      mix-blend-mode: screen;
    }
    body.active #scan-line { opacity: .17; }

    #grain {
      z-index: 4;
      opacity: .042;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    #vignette {
      z-index: 5;
      background:
        radial-gradient(ellipse at center, transparent 38%, rgb(0 0 0 / .22) 72%, rgb(0 0 0 / .84) 128%),
        linear-gradient(90deg, rgb(0 0 0 / .47), transparent 13%, transparent 87%, rgb(0 0 0 / .45));
    }

    #top-bloom {
      z-index: 1;
      opacity: .5;
      background: radial-gradient(ellipse at 50% -10%, rgb(255 223 153 / .28), transparent 49%);
      mix-blend-mode: screen;
    }

    #bottom-glow {
      z-index: 1;
      opacity: .46;
      background: radial-gradient(ellipse at 50% 110%, rgb(42 255 196 / .24), transparent 48%);
      mix-blend-mode: screen;
    }

    #readout {
      position: fixed;
      z-index: 9;
      left: 50%;
      top: 49%;
      width: min(92vw, 860px);
      padding: clamp(15px, 3.2vw, 27px) clamp(19px, 5vw, 52px) clamp(18px, 3.7vw, 33px);
      border: 1px solid rgb(255 255 255 / .22);
      border-radius: clamp(25px, 6vw, 52px);
      color: white;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      filter: blur(14px);
      transform: translate(-50%, -50%) scale(.7);
      background:
        linear-gradient(145deg, rgb(255 255 255 / .12), transparent 56%),
        rgb(var(--panel) / .66);
      box-shadow:
        0 24px 80px rgb(0 0 0 / .58),
        0 0 86px var(--accent-soft),
        inset 0 1px 0 rgb(255 255 255 / .26),
        inset 0 -1px 0 rgb(0 0 0 / .25);
      backdrop-filter: blur(23px) saturate(1.36);
      -webkit-backdrop-filter: blur(23px) saturate(1.36);
      transition:
        opacity 170ms ease,
        filter 240ms ease,
        transform 410ms cubic-bezier(.16, 1, .3, 1),
        box-shadow 140ms linear;
      will-change: opacity, filter, transform;
    }

    #readout.visible {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -50%) scale(1);
    }

    #evidence-class {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 27px;
      margin-bottom: clamp(9px, 2vw, 15px);
      padding: 6px 13px 7px;
      border: 1px solid rgb(var(--accent) / .62);
      border-radius: 999px;
      color: rgb(var(--accent));
      font-size: clamp(.62rem, 2.1vw, .87rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .16em;
      text-transform: uppercase;
      background: rgb(var(--accent) / .09);
      box-shadow: 0 0 25px var(--accent-soft), inset 0 1px 0 rgb(255 255 255 / .1);
    }

    #zone-name {
      display: block;
      margin: 0;
      font-size: clamp(2rem, 8.5vw, 6.8rem);
      font-weight: 950;
      line-height: .86;
      letter-spacing: -.058em;
      word-spacing: .1em;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: 0 0 30px var(--accent-soft), 0 5px 24px rgb(0 0 0 / .5);
    }
    #zone-name.compact { font-size: clamp(1.7rem, 7.15vw, 5.55rem); letter-spacing: -.046em; line-height: .9; }
    #zone-name.long { font-size: clamp(1.38rem, 5.9vw, 4.45rem); letter-spacing: -.034em; line-height: .94; }

    #feature-name {
      display: block;
      margin-top: clamp(8px, 1.8vw, 14px);
      font-size: clamp(.9rem, 3.2vw, 1.62rem);
      font-weight: 880;
      line-height: 1.08;
      letter-spacing: .105em;
      text-transform: uppercase;
    }

    #metric {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      margin-top: clamp(10px, 2vw, 17px);
      padding: 7px 13px 8px;
      border: 1px solid rgb(255 255 255 / .18);
      border-radius: 999px;
      font-size: clamp(.67rem, 2.2vw, .92rem);
      font-weight: 820;
      line-height: 1.12;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: rgb(0 0 0 / .2);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / .11);
    }

    #fact {
      display: block;
      max-width: 700px;
      margin: clamp(10px, 2.25vw, 17px) auto 0;
      font-size: clamp(.82rem, 2.63vw, 1.1rem);
      font-weight: 600;
      line-height: 1.42;
      letter-spacing: .005em;
      color: rgb(255 255 255 / .91);
      text-wrap: pretty;
    }

    #touch-orb {
      position: fixed;
      z-index: 8;
      left: 50%;
      top: 93%;
      width: clamp(58px, 15vw, 104px);
      aspect-ratio: 1;
      border: 1px solid rgb(var(--accent) / .82);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.4);
      background: radial-gradient(circle, rgb(255 255 255 / .82) 0 2%, rgb(var(--accent) / .34) 7%, rgb(var(--accent) / .09) 36%, transparent 70%);
      box-shadow: 0 0 18px rgb(var(--accent) / .58), 0 0 62px rgb(var(--accent) / .42), inset 0 0 26px rgb(var(--accent) / .19);
      transition: opacity 150ms ease, transform 260ms cubic-bezier(.16, 1, .3, 1);
    }
    #touch-orb.visible { opacity: .9; transform: translate(-50%, -50%) scale(1); }

    #journey-scale {
      position: fixed;
      z-index: 7;
      right: max(10px, env(safe-area-inset-right));
      top: max(19px, env(safe-area-inset-top));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: clamp(50px, 10vw, 78px);
      pointer-events: none;
      opacity: .58;
      transition: opacity 180ms ease;
    }
    body.active #journey-scale { opacity: .9; }

    #scale-track {
      position: absolute;
      right: 11px;
      top: 48px;
      bottom: 48px;
      width: 3px;
      border-radius: 999px;
      overflow: hidden;
      background: rgb(255 255 255 / .14);
      box-shadow: 0 0 12px rgb(0 0 0 / .5);
    }
    #scale-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--progress);
      border-radius: inherit;
      background: linear-gradient(to top, rgb(70 255 186 / .68), rgb(var(--accent)));
      box-shadow: 0 0 14px rgb(var(--accent) / .72);
    }
    #scale-dot {
      position: absolute;
      right: 6px;
      bottom: 48px;
      width: 13px;
      height: 13px;
      border: 2px solid rgb(255 255 255 / .84);
      border-radius: 50%;
      transform: translateY(50%);
      background: rgb(var(--accent));
      box-shadow: 0 0 17px rgb(var(--accent) / .85);
    }
    #scale-bottom,
    #scale-top {
      position: absolute;
      right: 0;
      width: 74px;
      font-size: clamp(.49rem, 1.6vw, .61rem);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: .11em;
      text-align: right;
      text-transform: uppercase;
      color: rgb(255 255 255 / .65);
    }
    #scale-top { top: 0; }
    #scale-bottom { bottom: 0; }
    #scale-value {
      position: absolute;
      right: 25px;
      top: 50%;
      width: min(34vh, 250px);
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: right center;
      font-size: clamp(.54rem, 1.7vw, .66rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .14em;
      text-align: center;
      text-transform: uppercase;
      color: rgb(var(--accent));
      text-shadow: 0 0 14px rgb(var(--accent) / .6);
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      z-index: 6;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
      width: min(78vw, 530px);
      transform: translateX(-50%);
      color: rgb(255 255 255 / .78);
      text-align: center;
      pointer-events: none;
      font-size: clamp(.7rem, 2.4vw, .94rem);
      font-weight: 800;
      line-height: 1.34;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-shadow: 0 2px 16px rgb(0 0 0 / .8);
      animation: breathe 3.2s ease-in-out infinite;
    }
    #hint strong { color: rgb(var(--accent)); }

    .ripple {
      position: fixed;
      z-index: 7;
      width: 20px;
      height: 20px;
      border: 1px solid rgb(var(--accent) / .78);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 22px rgb(var(--accent) / .52), inset 0 0 15px rgb(var(--accent) / .2);
      animation: ripple 920ms cubic-bezier(.16, 1, .3, 1) forwards;
    }

    @keyframes ripple { to { width: min(72vw, 560px); height: min(72vw, 560px); opacity: 0; } }
    @keyframes breathe {
      0%, 100% { opacity: .4; transform: translateX(-50%) translateY(0); }
      50% { opacity: .95; transform: translateX(-50%) translateY(-3px); }
    }

    @media (max-height: 620px) {
      #readout { width: min(88vw, 760px); padding-top: 12px; padding-bottom: 14px; }
      #evidence-class { margin-bottom: 7px; }
      #fact { margin-top: 8px; line-height: 1.32; }
      #metric { margin-top: 7px; }
      #journey-scale { opacity: .46; }
    }

    @media (max-width: 460px) {
      #readout { width: 91vw; }
      #journey-scale { right: 3px; }
      #scale-value { display: none; }
      #scale-bottom, #scale-top { width: 54px; font-size: .45rem; }
      #hint { width: 72vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      #hint { animation: none; }
      .ripple { animation-duration: 1ms; }
      #readout, #touch-orb, #light-field, #scan-line { transition-duration: 1ms; }
    }
  </style>
</head>
<body>
  <canvas id="life-spectrum" tabindex="0" role="application" aria-label="Exploración táctil de la vida, desde el umbral de la vida en la parte inferior hasta la experiencia consciente en la parte superior. Toca, arrastra o usa las flechas del teclado."></canvas>
  <div id="top-bloom" aria-hidden="true"></div>
  <div id="bottom-glow" aria-hidden="true"></div>
  <div id="light-field" aria-hidden="true"></div>
  <div id="scan-line" aria-hidden="true"></div>
  <div id="grain" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>

  <div id="hint" aria-hidden="true"><strong>Toca y asciende</strong> · de la primera célula a la conciencia</div>

  <div id="readout" aria-live="polite" aria-atomic="true">

    <strong id="zone-name"></strong>
    <span id="feature-name"></span>

    <span id="fact"></span>

  <div id="touch-orb" aria-hidden="true"></div>

  <div id="journey-scale" aria-hidden="true">
    <span id="scale-top">La experiencia consciente</span>
    <div id="scale-track"><div id="scale-fill"></div></div>
    <div id="scale-dot"></div>
    <span id="scale-value">El umbral de la vida</span>
    <span id="scale-bottom">El umbral de la vida</span>
  </div>

  <!--
    Visualización educativa conceptual, táctil y sin dependencias externas.

    La escala vertical representa una secuencia explicativa, no una escalera lineal de progreso ni una
    cronología proporcional. La evolución no tiene una meta prevista y las especies actuales no son
    versiones inferiores o superiores unas de otras. Muchos rasgos aparecieron de forma independiente,
    se perdieron, se recombinaron o permanecieron en linajes distintos.

    No conocemos el instante exacto ni la ruta concreta por la que comenzó la vida. El ancestro común de
    la vida moderna no tiene por qué haber sido la primera entidad viva. La transición a células complejas
    se relaciona con endosimbiosis, pero los detalles históricos continúan investigándose.

    La conciencia se presenta como una frontera científica abierta. No se afirma que exista solo en seres
    humanos, que dependa de una única región cerebral ni que una teoría concreta esté confirmada. Los
    elementos visuales representan conceptos, no reconstrucciones literales de organismos ancestrales.
  -->

          hub: seeded(i + 22000) > .82

      }

      for (let i = 0; i < 31; i++) {
        ecosystemNodes.push({
          x: .06 + seeded(i + 23000) * .88,
          y: .12 + seeded(i + 24000) * .76,
          r: 2 + seeded(i + 25000) * 6,
          phase: seeded(i + 26000) * TAU,
          level: i % 4
        });
      }
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.max(1, rect.width);
      height = Math.max(1, rect.height);
      dpr = Math.min(2, devicePixelRatio || 1);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildScene();
      shownX = targetX * width;
      shownY = targetY * height;
      setCssPoint(shownX, shownY);
    }

    function ensureAudio() {
      if (audioCtx) {
        if (audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
        return;
      }
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      audioCtx = new AudioContext();
      master = audioCtx.createGain();
      master.gain.value = 0;
      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -24;
      compressor.knee.value = 20;
      compressor.ratio.value = 5;
      master.connect(compressor).connect(audioCtx.destination);

      droneA = audioCtx.createOscillator();
      droneB = audioCtx.createOscillator();
      droneGain = audioCtx.createGain();
      droneFilter = audioCtx.createBiquadFilter();
      stereo = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : audioCtx.createGain();
      droneA.type = "sine";
      droneB.type = "triangle";
      droneGain.gain.value = .0001;
      droneFilter.type = "lowpass";
      droneFilter.frequency.value = 850;
      droneFilter.Q.value = .8;
      droneA.connect(droneGain);
      droneB.connect(droneGain);
      droneGain.connect(droneFilter).connect(stereo).connect(master);
      droneA.start();
      droneB.start();

      pulseOsc = audioCtx.createOscillator();
      pulseGain = audioCtx.createGain();
      pulseOsc.type = "sine";
      pulseGain.gain.value = .0001;
      pulseOsc.connect(pulseGain).connect(master);
      pulseOsc.start();

      const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
      const channel = noiseBuffer.getChannelData(0);
      for (let i = 0; i < channel.length; i++) channel[i] = Math.random() * 2 - 1;
      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      noiseSource.loop = true;
      noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 1100;
      noiseFilter.Q.value = .5;
      noiseGain = audioCtx.createGain();
      noiseGain.gain.value = .0001;
      noiseSource.connect(noiseFilter).connect(noiseGain).connect(master);
      noiseSource.start();
    }

    function setAudioFor(zone, xNorm, progress, active) {
      if (!audioCtx || !master) return;
      const now = audioCtx.currentTime;
      const s = zone.sound;
      const base = s.base * (.93 + xNorm * .15);
      droneA.type = s.type;
      droneB.type = s.type === "sawtooth" || s.type === "square" ? "triangle" : "sine";
      droneA.frequency.setTargetAtTime(base, now, .08);
      droneB.frequency.setTargetAtTime(base * (1.498 + progress * .009), now, .1);
      droneFilter.frequency.setTargetAtTime(s.filter * (.84 + xNorm * .28), now, .1);
      droneGain.gain.setTargetAtTime(active ? .012 + progress * .006 : .0001, now, .09);
      pulseOsc.frequency.setTargetAtTime(base * (1.985 + s.pulse), now, .08);
      pulseGain.gain.setTargetAtTime(active ? .0026 + progress * .002 : .0001, now, .1);
      noiseFilter.frequency.setTargetAtTime(s.filter * 1.12, now, .1);
      noiseGain.gain.setTargetAtTime(active ? Math.max(.0001, s.noise * .06) : .0001, now, .1);
      if (stereo.pan) stereo.pan.setTargetAtTime((xNorm - .5) * .7, now, .08);
      master.gain.setTargetAtTime(active ? .27 : .0001, now, .09);
    }

    function ping(zone, xNorm, featureIndex = 0) {
      if (!audioCtx || !master) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
      const scale = [1, 1.125, 1.25, 1.5, 1.667, 2, 2.25, 2.5, 2.75][featureIndex % 9];
      osc.type = zone.sound.type;
      osc.frequency.setValueAtTime(Math.max(38, zone.sound.base * 2.5 * scale), now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(36, zone.sound.base * 1.2), now + .48);
      filter.type = "lowpass";
      filter.frequency.value = Math.max(380, zone.sound.filter * 1.42);
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(.026, now + .012);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .56);
      osc.connect(filter).connect(gain);
      if (pan) {
        pan.pan.value = (xNorm - .5) * 1.35;
        gain.connect(pan).connect(master);
      } else gain.connect(master);
      osc.start(now);
      osc.stop(now + .62);
    }

    function queueSpeech(label) {
      if (!speechUnlocked || !("speechSynthesis" in window) || !label || label === lastSpoken) return;
      clearTimeout(speechTimer);
      speechTimer = setTimeout(() => {
        try {
          speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(label);
          utterance.lang = "es-ES";
          utterance.rate = .86;
          utterance.pitch = 1;
          const voices = speechSynthesis.getVoices();
          const voice = voices.find(v => /^es(-|_)/i.test(v.lang)) || voices.find(v => /spanish|español/i.test(v.name));
          if (voice) utterance.voice = voice;
          speechSynthesis.speak(utterance);
          lastSpoken = label;
        } catch (_) {}
      }, 360);
    }

    function addRipple(x, y) {
      const node = document.createElement("div");
      node.className = "ripple";
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      document.body.appendChild(node);
      node.addEventListener("animationend", () => node.remove(), { once: true });
    }

    function addBurst(x, y, color) {
      const count = reducedMotion ? 5 : 13;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * TAU;
        const speed = 18 + Math.random() * 72;
        bursts.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          r: .8 + Math.random() * 2.4, life: 1, decay: 1 + Math.random() * .8,
          color
        });
      }
      waves.push({ x, y, radius: 5, life: 1, color });
    }

    function updateReadout(x, y, isNewPress = false) {
      const xNorm = clamp(x / width, 0, .999999);
      const yNorm = clamp(y / height, 0, .999999);
      const progress = depthFromY(yNorm);
      const zone = zoneForDepth(progress);
      const feature = featureFor(zone, xNorm);

      targetX = xNorm;
      targetY = yNorm;
      touchEnergy = 1;
      setCssPoint(x, y);
      setAccent(zone);
      root.style.setProperty("--progress", `${Math.max(1.2, progress * 100)}%`);
      scaleDot.style.bottom = `${48 + progress * Math.max(0, height - 96)}px`;
      touchOrb.style.left = `${x}px`;
      touchOrb.style.top = `${y}px`;
      scaleValue.textContent = zone.className;

      const changed = zone.id !== lastZoneId || feature.index !== lastFeature;
      if (changed || isNewPress) {
        evidenceClass.textContent = zone.className;
        zoneName.textContent = zone.name;
        zoneName.className = zone.name.length > 31 ? "long" : zone.name.length > 21 ? "compact" : "";
        featureName.textContent = feature.name;
        metric.textContent = zone.metric;
        fact.textContent = feature.fact || zone.fact;
        ping(zone, xNorm, feature.index);
        addBurst(x, y, zone.color);
        queueSpeech(feature.name);
        lastZoneId = zone.id;
        lastFeature = feature.index;
      }

      readout.classList.add("visible");
      touchOrb.classList.add("visible");
      document.body.classList.add("active");
      hint.style.display = "none";
      setAudioFor(zone, xNorm, progress, true);
    }

    function releaseInteraction(delay = 1050) {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        readout.classList.remove("visible");
        touchOrb.classList.remove("visible");
        document.body.classList.remove("active");
        const zone = zoneForDepth(depthFromY(targetY));
        setAudioFor(zone, targetX, depthFromY(targetY), false);
      }, delay);
    }

    function endPointer() {
      pointerDown = false;
      releaseInteraction();
    }

    canvas.addEventListener("pointerdown", event => {
      event.preventDefault();
      canvas.focus({ preventScroll: true });
      pointerDown = true;
      speechUnlocked = true;
      ensureAudio();
      try { canvas.setPointerCapture(event.pointerId); } catch (_) {}
      updateReadout(event.clientX, event.clientY, true);
      addRipple(event.clientX, event.clientY);
    });

    canvas.addEventListener("pointermove", event => {
      if (!pointerDown && event.pointerType !== "mouse") return;
      if (!pointerDown && event.buttons === 0) {
        targetX = clamp(event.clientX / width, 0, 1);
        targetY = clamp(event.clientY / height, 0, 1);
        return;
      }
      event.preventDefault();
      updateReadout(event.clientX, event.clientY);
    });

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("lostpointercapture", endPointer);

    canvas.addEventListener("keydown", event => {
      const keys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter", " "];
      if (!keys.includes(event.key)) return;
      event.preventDefault();
      speechUnlocked = true;
      ensureAudio();
      const step = event.shiftKey ? .09 : .035;
      if (event.key === "ArrowUp") targetY = clamp(targetY - step, .005, .995);
      if (event.key === "ArrowDown") targetY = clamp(targetY + step, .005, .995);
      if (event.key === "ArrowLeft") targetX = clamp(targetX - step, .005, .995);
      if (event.key === "ArrowRight") targetX = clamp(targetX + step, .005, .995);
      updateReadout(targetX * width, targetY * height, event.key === "Enter" || event.key === " ");
      releaseInteraction(1600);
    });

    function gradientStops(progress) {
      const stops = [
        [[2, 11, 14], [5, 34, 29]],
        [[3, 18, 21], [7, 48, 36]],
        [[4, 23, 19], [25, 58, 31]],
        [[18, 24, 16], [74, 60, 21]],
        [[31, 21, 17], [96, 42, 31]],
        [[29, 13, 31], [90, 30, 77]],
        [[18, 20, 50], [38, 58, 112]],
        [[10, 31, 48], [25, 101, 116]],
        [[20, 23, 68], [86, 55, 132]],
        [[37, 23, 60], [139, 88, 130]],
        [[45, 34, 46], [170, 124, 78]]
      ];
      const pos = clamp(progress, 0, .9999) * (stops.length - 1);
      const i = Math.floor(pos);
      const t = smooth(pos - i);
      const next = Math.min(stops.length - 1, i + 1);
      return [
        stops[i][0].map((v, k) => Math.round(mix(v, stops[next][0][k], t))),
        stops[i][1].map((v, k) => Math.round(mix(v, stops[next][1][k], t)))
      ];
    }

    function drawBackground(progress, time) {
      const [bottom, top] = gradientStops(progress);
      const g = ctx.createLinearGradient(0, height, 0, 0);
      g.addColorStop(0, `rgb(${bottom[0]} ${bottom[1]} ${bottom[2]})`);
      g.addColorStop(.5, `rgb(${Math.round((bottom[0] + top[0]) * .45)} ${Math.round((bottom[1] + top[1]) * .45)} ${Math.round((bottom[2] + top[2]) * .45)})`);
      g.addColorStop(1, `rgb(${top[0]} ${top[1]} ${top[2]})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);

      const horizon = mix(height * .78, height * .28, progress);
      const glow = ctx.createRadialGradient(width * .5, horizon, 0, width * .5, horizon, Math.max(width, height) * .72);
      glow.addColorStop(0, `rgba(${90 + progress * 135},${220 - progress * 35},${172 + progress * 50},${.08 + progress * .07})`);
      glow.addColorStop(.55, "rgba(90,170,160,.025)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      for (let i = 0; i < motes.length; i++) {
        const m = motes[i];
        m.x = fract(m.x + m.vx * .0025);
        m.y = fract(m.y + m.vy * .0025);
        const x = m.x * width + Math.sin(time * .12 + m.phase) * 7;
        const y = m.y * height + Math.cos(time * .09 + m.phase) * 6;
        const twinkle = .16 + .22 * (1 + Math.sin(time * .7 + m.phase)) * .5;
        const color = m.kind % 3 === 0 ? [110,255,195] : m.kind % 3 === 1 ? [255,190,115] : [180,170,255];
        ctx.fillStyle = rgba(color, twinkle * (.65 + progress * .4));
        ctx.beginPath();
        ctx.arc(x, y, m.r * (.65 + progress * .3), 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMembrane(cx, cy, r, color, time, phase = 0, thickness = 1.5, fillAlpha = .045) {
      ctx.save();
      const fill = ctx.createRadialGradient(cx - r * .3, cy - r * .3, 0, cx, cy, r * 1.15);
      fill.addColorStop(0, rgba(color, fillAlpha * 2.4));
      fill.addColorStop(1, rgba(color, fillAlpha * .25));
      ctx.fillStyle = fill;
      ctx.beginPath();
      for (let k = 0; k <= 64; k++) {
        const a = k / 64 * TAU;
        const wobble = 1 + .035 * Math.sin(a * 5 + time * .55 + phase) + .02 * Math.sin(a * 9 - time * .35 + phase);
        const x = cx + Math.cos(a) * r * wobble;
        const y = cy + Math.sin(a) * r * wobble;
        if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = rgba(color, .48);
      ctx.lineWidth = thickness;
      ctx.stroke();
      ctx.restore();
    }

    function drawThreshold(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save();
      ctx.globalAlpha = alpha;
      const s = Math.min(width, height);
      const cx = width * .5;
      const cy = height * .52;
      const r = s * (.16 + .012 * Math.sin(time * .55));
      const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 3);
      halo.addColorStop(0, "rgba(99,255,190,.2)");
      halo.addColorStop(.4, "rgba(72,220,190,.07)");
      halo.addColorStop(1, "rgba(50,220,180,0)");
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, width, height);
      drawMembrane(cx, cy, r, [99,255,190], time, 0, 2.1, .07);
      for (let i = 0; i < 24; i++) {
        const a = i / 24 * TAU + time * (.04 + (i % 4) * .01);
        const rr = r * (.13 + .67 * seeded(i + 30000));
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        const c = i % 4 === 0 ? [255,135,188] : i % 3 === 0 ? [255,221,91] : [92,240,193];
        ctx.fillStyle = rgba(c, .58);
        ctx.beginPath(); ctx.arc(x, y, 1.7 + i % 3, 0, TAU); ctx.fill();
        const j = (i + 7) % 24;
        const aj = j / 24 * TAU + time * (.04 + (j % 4) * .01);
        const rrj = r * (.13 + .67 * seeded(j + 30000));
        ctx.strokeStyle = "rgba(130,255,205,.08)";
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(cx + Math.cos(aj) * rrj, cy + Math.sin(aj) * rrj); ctx.stroke();
      }
      ctx.restore();
    }

    function drawCellPopulation(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save(); ctx.globalAlpha = alpha;
      const s = Math.min(width, height);
      for (let i = 0; i < cells.length; i++) {
        const c = cells[i];
        const x = c.x * width + Math.sin(time * .18 * c.drift + c.phase) * s * .02;
        const y = c.y * height + Math.cos(time * .15 * c.drift + c.phase) * s * .015;
        const r = c.r * s * (1 + .08 * Math.sin(time * .6 + c.phase));
        const col = c.type % 3 === 0 ? [64,232,198] : c.type % 3 === 1 ? [97,232,145] : [99,204,255];
        drawMembrane(x, y, r, col, time, c.phase, 1.1, .035);
        for (let k = 0; k < 4 + c.type % 4; k++) {
          const a = c.phase + k * 1.7 + time * .12;
          const rr = r * (.18 + .5 * seeded(i * 17 + k + 31000));
          ctx.fillStyle = k % 2 ? rgba([255,194,94], .48) : rgba([118,245,199], .52);
          ctx.beginPath(); ctx.arc(x + Math.cos(a) * rr, y + Math.sin(a) * rr, 1.3 + (k % 3), 0, TAU); ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawMetabolism(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save(); ctx.globalAlpha = alpha;
      const cx = width * .5, cy = height * .5, s = Math.min(width, height), r = s * .23;
      drawMembrane(cx, cy, r, [104,236,111], time, .5, 1.7, .03);
      for (let path = 0; path < 7; path++) {
        ctx.strokeStyle = path % 2 ? "rgba(254,220,85,.28)" : "rgba(105,244,139,.28)";
        ctx.lineWidth = 1.2 + (path % 3) * .45;
        ctx.beginPath();
        for (let k = 0; k <= 60; k++) {
          const t = k / 60;
          const a = t * TAU * (1.2 + path * .08) + path + time * (.08 + path * .006);
          const rr = r * (.15 + .7 * t) * (1 - .35 * t);
          const x = cx + Math.cos(a) * rr + Math.sin(t * 8 + path) * r * .08;
          const y = cy + Math.sin(a * .88) * rr;
          if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        const t = fract(time * (.1 + path * .009) + path * .14);
        const a = t * TAU * (1.2 + path * .08) + path + time * (.08 + path * .006);
        const rr = r * (.15 + .7 * t) * (1 - .35 * t);
        ctx.fillStyle = path % 2 ? "rgba(255,230,105,.82)" : "rgba(121,255,159,.78)";
        ctx.beginPath(); ctx.arc(cx + Math.cos(a) * rr + Math.sin(t * 8 + path) * r * .08, cy + Math.sin(a * .88) * rr, 3.2, 0, TAU); ctx.fill();
      }
      for (let i = 0; i < 16; i++) {
        const side = i % 2 ? -1 : 1;
        const y = height * (.14 + i / 16 * .72);
        const x = cx + side * r * (1.05 + .22 * Math.sin(time + i));
        ctx.strokeStyle = i % 3 ? "rgba(120,255,155,.22)" : "rgba(255,173,90,.25)";
        ctx.beginPath(); ctx.moveTo(x + side * s * .08, y); ctx.lineTo(x, y + Math.sin(time + i) * 8); ctx.stroke();
      }
      ctx.restore();
    }

    function drawGenetics(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save(); ctx.globalAlpha = alpha;
      const left = width * .17, right = width * .83, cy = height * .5;
      for (let i = 0; i < genes.length; i++) {
        const g = genes[i];
        const x = mix(left, right, g.t);
        const amp = height * (.11 + .018 * Math.sin(g.t * TAU));
        const phase = g.t * TAU * 3.2 + time * .65;
        const y1 = cy + Math.sin(phase) * amp;
        const y2 = cy - Math.sin(phase) * amp;
        const mutation = g.mutation && Math.sin(time * 1.7 + g.phase) > .15;
        ctx.strokeStyle = mutation ? "rgba(255,96,146,.75)" : "rgba(202,244,89,.32)";
        ctx.lineWidth = mutation ? 2.2 : 1;
        ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
        ctx.fillStyle = mutation ? "rgba(255,106,153,.9)" : "rgba(205,246,100,.68)";
        ctx.beginPath(); ctx.arc(x, y1, mutation ? 4 : 2.5, 0, TAU); ctx.fill();
        ctx.fillStyle = "rgba(113,232,170,.63)";
        ctx.beginPath(); ctx.arc(x, y2, 2.5, 0, TAU); ctx.fill();
        if (i > 0) {
          const prev = genes[i - 1];
          const px = mix(left, right, prev.t);
          const pp = prev.t * TAU * 3.2 + time * .65;
          ctx.strokeStyle = "rgba(220,245,120,.2)";
          ctx.beginPath(); ctx.moveTo(px, cy + Math.sin(pp) * amp); ctx.lineTo(x, y1); ctx.stroke();
          ctx.strokeStyle = "rgba(113,232,170,.18)";
          ctx.beginPath(); ctx.moveTo(px, cy - Math.sin(pp) * amp); ctx.lineTo(x, y2); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawEvolution(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save(); ctx.globalAlpha = alpha;
      const roots = 8;
      for (let i = 0; i < roots; i++) {
        const x0 = width * (.08 + i / (roots - 1) * .84);
        const y0 = height * .86;
        ctx.strokeStyle = `rgba(${210 + i * 4},${180 + i * 6},${75 + i * 10},${.14 + i * .012})`;
        ctx.lineWidth = 1.1 + (i % 3) * .5;
        ctx.beginPath(); ctx.moveTo(x0, y0);
        let x = x0;
        for (let k = 1; k <= 15; k++) {
          const t = k / 15;
          const y = mix(y0, height * .12, t);
          x = x0 + Math.sin(t * 8 + i * 1.2) * width * .035 + (seeded(i * 22 + k + 32000) - .5) * width * .035 * t;
          ctx.lineTo(x, y);
          if ((k + i) % 5 === 0) {
            const bx = x + (seeded(i * 43 + k + 33000) - .5) * width * .16;
            ctx.moveTo(x, y); ctx.lineTo(bx, y - height * (.05 + seeded(k + i) * .05)); ctx.moveTo(x, y);
          }
        }
        ctx.stroke();
        const pulse = fract(time * .07 + i / roots);
        const py = mix(y0, height * .12, pulse);
        const px = x0 + Math.sin(pulse * 8 + i * 1.2) * width * .035;
        ctx.fillStyle = "rgba(255,226,92,.68)";
        ctx.beginPath(); ctx.arc(px, py, 2.4 + Math.sin(pulse * Math.PI) * 2, 0, TAU); ctx.fill();
      }
      ctx.restore();
    }

    function drawPhotosynthesis(progress, time, alpha) {
      if (alpha <= .001) return;
      ctx.save(); ctx.globalAlpha = alpha;
      const sunX = width * .5, sunY = -height * .08, sunR = Math.min(width, height) * .23;
      const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 3.5);

      ctx.stroke();
      ctx.fillStyle = "rgba(255,244,221,.88)"; ctx.beginPath(); ctx.arc(cx + r * .18, cy - r * .18, 3.3 + Math.sin(time) * .8, 0, TAU); ctx.fill();
      for (let i = 0; i < 26; i++) {
        const a = i / 26 * TAU + time * .035;
        const rr = r * (1.15 + .9 * seeded(i + 41000));
        ctx.fillStyle = i % 4 === 0 ? "rgba(255,221,165,.62)" : i % 3 === 0 ? "rgba(221,171,255,.52)" : "rgba(138,207,255,.42)";
        ctx.beginPath(); ctx.arc(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr * .72, 1.5 + i % 3, 0, TAU); ctx.fill();
      }
      ctx.restore();
    }

    function zoneWeight(progress, p0, p1, feather = .045) {
      const enter = smooth(clamp((progress - (p0 - feather)) / feather, 0, 1));
      const exit = 1 - smooth(clamp((progress - p1) / feather, 0, 1));
      return enter * exit;
    }

    function drawBursts(dt) {
      for (let i = bursts.length - 1; i >= 0; i--) {
        const p = bursts[i];
        p.life -= dt * p.decay;
        if (p.life <= 0) { bursts.splice(i, 1); continue; }
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= Math.pow(.94, dt * 60); p.vy *= Math.pow(.94, dt * 60);
        ctx.fillStyle = rgba(p.color, p.life * .55);
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (.5 + p.life), 0, TAU); ctx.fill();
      }
      for (let i = waves.length - 1; i >= 0; i--) {
        const w = waves[i];
        w.life -= dt * 1.05;
        if (w.life <= 0) { waves.splice(i, 1); continue; }
        w.radius += dt * Math.min(width, height) * .24;
        ctx.strokeStyle = rgba(w.color, w.life * .25);
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(w.x, w.y, w.radius, 0, TAU); ctx.stroke();
      }
    }

    function render(now) {
      const dt = Math.min(.04, Math.max(.001, (now - lastFrame) / 1000));
      lastFrame = now;
      elapsed += reducedMotion ? dt * .24 : dt;
      pointerX += (targetX - pointerX) * (1 - Math.pow(.001, dt));
      pointerY += (targetY - pointerY) * (1 - Math.pow(.001, dt));
      currentProgress += (depthFromY(pointerY) - currentProgress) * (1 - Math.pow(.005, dt));
      shownX += (pointerX * width - shownX) * (1 - Math.pow(.001, dt));
      shownY += (pointerY * height - shownY) * (1 - Math.pow(.001, dt));
      touchEnergy *= Math.pow(.075, dt);

      drawBackground(currentProgress, elapsed);
      drawThreshold(currentProgress, elapsed, zoneWeight(currentProgress, 0, .075, .04));
      drawCellPopulation(currentProgress, elapsed, zoneWeight(currentProgress, .045, .19, .045));
      drawMetabolism(currentProgress, elapsed, zoneWeight(currentProgress, .13, .235, .045));
      drawGenetics(currentProgress, elapsed, zoneWeight(currentProgress, .195, .29, .04));
      drawEvolution(currentProgress, elapsed, zoneWeight(currentProgress, .245, .345, .045));
      drawPhotosynthesis(currentProgress, elapsed, zoneWeight(currentProgress, .31, .4, .04));
      drawEukaryote(currentProgress, elapsed, zoneWeight(currentProgress, .36, .46, .045));
      drawRecombination(currentProgress, elapsed, zoneWeight(currentProgress, .415, .51, .04));
      drawMulticellular(currentProgress, elapsed, zoneWeight(currentProgress, .47, .565, .045));
      drawDevelopment(currentProgress, elapsed, zoneWeight(currentProgress, .525, .62, .045));
      drawOrganisms(currentProgress, elapsed, zoneWeight(currentProgress, .58, .68, .045));
      drawEcosystem(currentProgress, elapsed, zoneWeight(currentProgress, .63, .725, .045));
      drawMovement(currentProgress, elapsed, zoneWeight(currentProgress, .69, .775, .04));
      drawSenses(currentProgress, elapsed, zoneWeight(currentProgress, .735, .825, .04));
      drawNeuralNetwork(currentProgress, elapsed, zoneWeight(currentProgress, .785, .875, .04));
      drawBrain(currentProgress, elapsed, zoneWeight(currentProgress, .835, .93, .04));
      drawPerception(currentProgress, elapsed, zoneWeight(currentProgress, .895, .975, .035));
      drawConsciousness(currentProgress, elapsed, smooth(clamp((currentProgress - .945) / .055, 0, 1)));

      drawBursts(dt);
      if (!pointerDown) setAccent(zoneForDepth(currentProgress));
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resize, { passive: true });
    window.addEventListener("orientationchange", () => setTimeout(resize, 120), { passive: true });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && audioCtx && audioCtx.state === "running") audioCtx.suspend().catch(() => {});
    });

    resize();
    setAccent(ZONES[0]);
    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
