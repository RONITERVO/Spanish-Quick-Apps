<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#070915">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Exploración táctil, visual y sonora de los futuros de la civilización: desde los futuros tecnológicos y la transición planetaria hasta la expansión cósmica y el horizonte desconocido.">

  <title>Espectro de los Futuros: de la Civilización Planetaria al Destino Cósmico</title>
  <style>
    :root {
      --accent: 116 228 255;
      --accent-soft: rgb(var(--accent) / .34);
      --ink: 255 255 255;
      --panel: 8 9 14;
      --scan-x: 50vw;
      --scan-y: 96vh;
      --progress: 2%;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: #05070a;
    }

    body {
      position: fixed;
      inset: 0;
      color: rgb(var(--ink));
      font-family: Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #futures-spectrum {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      outline: none;
    }

    #light-field,
    #scan-line,
    #grain,
    #vignette,
    #top-bloom,
    #bottom-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #light-field {
      z-index: 2;
      opacity: 0;
      transition: opacity 180ms ease;
      background: radial-gradient(circle at var(--scan-x) var(--scan-y), rgb(var(--accent) / .56) 0, rgb(var(--accent) / .15) 11%, transparent 35%);
      mix-blend-mode: screen;
    }
    body.active #light-field { opacity: .82; }

    #scan-line {
      z-index: 3;
      opacity: 0;
      transition: opacity 150ms ease;
      background:
        linear-gradient(90deg, transparent calc(var(--scan-x) - 1px), rgb(var(--accent) / .52) var(--scan-x), transparent calc(var(--scan-x) + 1px)),
        linear-gradient(180deg, transparent calc(var(--scan-y) - 1px), rgb(var(--accent) / .32) var(--scan-y), transparent calc(var(--scan-y) + 1px));
      mix-blend-mode: screen;
    }
    body.active #scan-line { opacity: .17; }

    #grain {
      z-index: 4;
      opacity: .042;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    #vignette {
      z-index: 5;
      background:
        radial-gradient(ellipse at center, transparent 38%, rgb(0 0 0 / .22) 72%, rgb(0 0 0 / .84) 128%),
        linear-gradient(90deg, rgb(0 0 0 / .47), transparent 13%, transparent 87%, rgb(0 0 0 / .45));
    }

    #top-bloom {
      z-index: 1;
      opacity: .5;
      background: radial-gradient(ellipse at 50% -10%, rgb(214 229 255 / .42), transparent 52%);
      mix-blend-mode: screen;
    }

    #bottom-glow {
      z-index: 1;
      opacity: .46;
      background: radial-gradient(ellipse at 50% 110%, rgb(91 209 255 / .22), transparent 50%);
      mix-blend-mode: screen;
    }

    #readout {
      position: fixed;
      z-index: 9;
      left: 50%;
      top: 49%;
      width: min(92vw, 860px);
      padding: clamp(15px, 3.2vw, 27px) clamp(19px, 5vw, 52px) clamp(18px, 3.7vw, 33px);
      border: 1px solid rgb(255 255 255 / .22);
      border-radius: clamp(25px, 6vw, 52px);
      color: white;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      filter: blur(14px);
      transform: translate(-50%, -50%) scale(.7);
      background:
        linear-gradient(145deg, rgb(255 255 255 / .12), transparent 56%),
        rgb(var(--panel) / .66);
      box-shadow:
        0 24px 80px rgb(0 0 0 / .58),
        0 0 86px var(--accent-soft),
        inset 0 1px 0 rgb(255 255 255 / .26),
        inset 0 -1px 0 rgb(0 0 0 / .25);
      backdrop-filter: blur(23px) saturate(1.36);
      -webkit-backdrop-filter: blur(23px) saturate(1.36);
      transition:
        opacity 170ms ease,
        filter 240ms ease,
        transform 410ms cubic-bezier(.16, 1, .3, 1),
        box-shadow 140ms linear;
      will-change: opacity, filter, transform;
    }

    #readout.visible {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -50%) scale(1);
    }

    #evidence-class {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 27px;
      margin-bottom: clamp(9px, 2vw, 15px);
      padding: 6px 13px 7px;
      border: 1px solid rgb(var(--accent) / .62);
      border-radius: 999px;
      color: rgb(var(--accent));
      font-size: clamp(.62rem, 2.1vw, .87rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .16em;
      text-transform: uppercase;
      background: rgb(var(--accent) / .09);
      box-shadow: 0 0 25px var(--accent-soft), inset 0 1px 0 rgb(255 255 255 / .1);
    }

    #zone-name {
      display: block;
      margin: 0;
      font-size: clamp(2rem, 8.5vw, 6.8rem);
      font-weight: 950;
      line-height: .86;
      letter-spacing: -.058em;
      word-spacing: .1em;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: 0 0 30px var(--accent-soft), 0 5px 24px rgb(0 0 0 / .5);
    }
    #zone-name.compact { font-size: clamp(1.7rem, 7.15vw, 5.55rem); letter-spacing: -.046em; line-height: .9; }
    #zone-name.long { font-size: clamp(1.38rem, 5.9vw, 4.45rem); letter-spacing: -.034em; line-height: .94; }

    #feature-name {
      display: block;
      margin-top: clamp(8px, 1.8vw, 14px);
      font-size: clamp(.9rem, 3.2vw, 1.62rem);
      font-weight: 880;
      line-height: 1.08;
      letter-spacing: .105em;
      text-transform: uppercase;
    }

    #metric {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      margin-top: clamp(10px, 2vw, 17px);
      padding: 7px 13px 8px;
      border: 1px solid rgb(255 255 255 / .18);
      border-radius: 999px;
      font-size: clamp(.67rem, 2.2vw, .92rem);
      font-weight: 820;
      line-height: 1.12;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: rgb(0 0 0 / .2);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / .11);
    }

    #fact {
      display: block;
      max-width: 700px;
      margin: clamp(10px, 2.25vw, 17px) auto 0;
      font-size: clamp(.82rem, 2.63vw, 1.1rem);
      font-weight: 600;
      line-height: 1.42;
      letter-spacing: .005em;
      color: rgb(255 255 255 / .91);
      text-wrap: pretty;
    }

    #touch-orb {
      position: fixed;
      z-index: 8;
      left: 50%;
      top: 93%;
      width: clamp(58px, 15vw, 104px);
      aspect-ratio: 1;
      border: 1px solid rgb(var(--accent) / .82);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.4);
      background: radial-gradient(circle, rgb(255 255 255 / .82) 0 2%, rgb(var(--accent) / .34) 7%, rgb(var(--accent) / .09) 36%, transparent 70%);
      box-shadow: 0 0 18px rgb(var(--accent) / .58), 0 0 62px rgb(var(--accent) / .42), inset 0 0 26px rgb(var(--accent) / .19);
      transition: opacity 150ms ease, transform 260ms cubic-bezier(.16, 1, .3, 1);
    }
    #touch-orb.visible { opacity: .9; transform: translate(-50%, -50%) scale(1); }

    #journey-scale {
      position: fixed;
      z-index: 7;
      right: max(10px, env(safe-area-inset-right));
      top: max(19px, env(safe-area-inset-top));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: clamp(50px, 10vw, 78px);
      pointer-events: none;
      opacity: .58;
      transition: opacity 180ms ease;
    }
    body.active #journey-scale { opacity: .9; }

    #scale-track {
      position: absolute;
      right: 11px;
      top: 48px;
      bottom: 48px;
      width: 3px;
      border-radius: 999px;
      overflow: hidden;
      background: rgb(255 255 255 / .14);
      box-shadow: 0 0 12px rgb(0 0 0 / .5);
    }
    #scale-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--progress);
      border-radius: inherit;
      background: linear-gradient(to top, rgb(94 214 164 / .68), rgb(var(--accent)));
      box-shadow: 0 0 14px rgb(var(--accent) / .72);
    }
    #scale-dot {
      position: absolute;
      right: 6px;
      bottom: 48px;
      width: 13px;
      height: 13px;
      border: 2px solid rgb(255 255 255 / .84);
      border-radius: 50%;
      transform: translateY(50%);
      background: rgb(var(--accent));
      box-shadow: 0 0 17px rgb(var(--accent) / .85);
    }
    #scale-bottom,
    #scale-top {
      position: absolute;
      right: 0;
      width: 74px;
      font-size: clamp(.49rem, 1.6vw, .61rem);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: .11em;
      text-align: right;
      text-transform: uppercase;
      color: rgb(255 255 255 / .65);
    }
    #scale-top { top: 0; }
    #scale-bottom { bottom: 0; }
    #scale-value {
      position: absolute;
      right: 25px;
      top: 50%;
      width: min(34vh, 250px);
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: right center;
      font-size: clamp(.54rem, 1.7vw, .66rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: .14em;
      text-align: center;
      text-transform: uppercase;
      color: rgb(var(--accent));
      text-shadow: 0 0 14px rgb(var(--accent) / .6);
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      z-index: 6;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
      width: min(78vw, 530px);
      transform: translateX(-50%);
      color: rgb(255 255 255 / .78);
      text-align: center;
      pointer-events: none;
      font-size: clamp(.7rem, 2.4vw, .94rem);
      font-weight: 800;
      line-height: 1.34;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-shadow: 0 2px 16px rgb(0 0 0 / .8);
      animation: breathe 3.2s ease-in-out infinite;
    }
    #hint strong { color: rgb(var(--accent)); }

    .ripple {
      position: fixed;
      z-index: 7;
      width: 20px;
      height: 20px;
      border: 1px solid rgb(var(--accent) / .78);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 22px rgb(var(--accent) / .52), inset 0 0 15px rgb(var(--accent) / .2);
      animation: ripple 920ms cubic-bezier(.16, 1, .3, 1) forwards;
    }

    @keyframes ripple { to { width: min(72vw, 560px); height: min(72vw, 560px); opacity: 0; } }
    @keyframes breathe {
      0%, 100% { opacity: .4; transform: translateX(-50%) translateY(0); }
      50% { opacity: .95; transform: translateX(-50%) translateY(-3px); }
    }

    @media (max-height: 620px) {
      #readout { width: min(88vw, 760px); padding-top: 12px; padding-bottom: 14px; }
      #evidence-class { margin-bottom: 7px; }
      #fact { margin-top: 8px; line-height: 1.32; }
      #metric { margin-top: 7px; }
      #journey-scale { opacity: .46; }
    }

    @media (max-width: 460px) {
      #readout { width: 91vw; }
      #journey-scale { right: 3px; }
      #scale-value { display: none; }
      #scale-bottom, #scale-top { width: 54px; font-size: .45rem; }
      #hint { width: 72vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      #hint { animation: none; }
      .ripple { animation-duration: 1ms; }
      #readout, #touch-orb, #light-field, #scan-line { transition-duration: 1ms; }
    }
  </style>
</head>
<body>
  <canvas id="futures-spectrum" tabindex="0" role="application" aria-label="Exploración táctil de los futuros de la civilización, desde los futuros tecnológicos en la parte inferior hasta el horizonte desconocido en la parte superior. Toca, arrastra o usa las flechas del teclado."></canvas>
  <div id="top-bloom" aria-hidden="true"></div><div id="bottom-glow" aria-hidden="true"></div><div id="light-field" aria-hidden="true"></div><div id="scan-line" aria-hidden="true"></div><div id="grain" aria-hidden="true"></div><div id="vignette" aria-hidden="true"></div>
  <div id="hint" aria-hidden="true"><strong>Toca y asciende</strong> · del presente planetario al destino cósmico</div>
  <div id="readout" aria-live="polite" aria-atomic="true"><span id="evidence-class"></span><strong id="zone-name"></strong><span id="feature-name"></span><span id="metric"></span><span id="fact"></span></div>
  <div id="touch-orb" aria-hidden="true"></div>
  <div id="journey-scale" aria-hidden="true"><span id="scale-top">Horizonte desconocido</span><div id="scale-track"><div id="scale-fill"></div></div><div id="scale-dot"></div><span id="scale-value">Futuros tecnológicos</span><span id="scale-bottom">Futuros tecnológicos</span></div>

  <!--
    Visualización educativa conceptual, táctil y sin dependencias externas.

    La escala vertical representa escenarios y capacidades posibles, no una cronología inevitable ni una
    predicción. Los niveles cercanos al presente combinan tecnologías existentes con transiciones todavía
    incompletas; los niveles superiores son progresivamente más hipotéticos. Cada capacidad puede producir
    resultados distintos según valores, propiedad, distribución, instituciones, cooperación y accidentes.

    La aplicación distingue posibilidad física, viabilidad técnica, legitimidad política y deseabilidad social.
    No afirma que la inteligencia implique conciencia, que la expansión espacial sea inevitable, que una mayor
    escala energética equivalga a progreso moral ni que la humanidad tenga derecho automático a transformar
    otros mundos. Las escenas son metáforas interactivas, no reconstrucciones ni predicciones literales.
  -->

    function sceneSpaceIndustry(z,time){const s=Math.min(width,height),cx=width*.35,cy=height*.6,r=s*.16;drawPlanet(cx,cy,r,z,time,true);for(let i=0;i<8;i++){const a=i/8*TAU+time*(.035+i*.002),rr=r*(1.5+(i%3)*.25);drawSatellite(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr*.55,s*.09,z,a+Math.PI*.5);}const moonX=width*.78,moonY=height*.34;drawPlanet(moonX,moonY,s*.1,{color:[205,208,214]},time,false);drawHabitat(moonX,moonY+s*.1,s*.55,z,2);for(let i=0;i<4;i++){const p=fract(time*.045+i*.23),x=mix(cx,moonX,p),y=mix(cy,moonY,p)-Math.sin(p*Math.PI)*s*.2;polygon([[x-s*.02,y],[x+s*.025,y],[x+s*.04,y+s*.012],[x-s*.035,y+s*.012]],rgba(z.color,.55),rgba([255,255,255],.5),1);}}
    function sceneSettlements(z,time){const s=Math.min(width,height),horizon=height*.65;const g=ctx.createLinearGradient(0,horizon,0,height);g.addColorStop(0,'rgba(120,75,55,.08)');g.addColorStop(1,'rgba(180,90,55,.32)');ctx.fillStyle=g;ctx.fillRect(0,horizon,width,height-horizon);ctx.strokeStyle='rgba(255,200,160,.26)';ctx.beginPath();ctx.moveTo(0,horizon);for(let x=0;x<=width;x+=width/12)ctx.lineTo(x,horizon-Math.sin(x*.018+time*.05)*s*.035-seeded(x+5)*s*.04);ctx.lineTo(width,height);ctx.lineTo(0,height);ctx.closePath();ctx.stroke();drawHabitat(width*.5,horizon+s*.12,s*.95,z,4);for(let i=0;i<6;i++){const x=width*(.13+i*.15),y=horizon+s*(.2+(i%2)*.04);circle(x,y,s*.018,'rgba(230,235,240,.55)',rgba(z.color,.55),1);line(x,y+s*.018,x-s*.018,y+s*.07,rgba([220,225,235],.48),2);line(x,y+s*.018,x+s*.018,y+s*.07,rgba([220,225,235],.48),2);}ctx.font=`900 ${s*.024}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.58)';ctx.fillText('VISITA → BASE → ASENTAMIENTO → SOCIEDAD',width*.5,height*.92);}
    function sceneMultiplanetary(z,time){const s=Math.min(width,height),planets=[[width*.2,height*.68,s*.115,[90,190,255]],[width*.52,height*.32,s*.09,[255,155,100]],[width*.8,height*.69,s*.08,[190,185,220]]];for(let i=0;i<planets.length;i++){const p=planets[i];drawPlanet(p[0],p[1],p[2],{color:p[3]},time,i===0);for(let k=0;k<4;k++){const a=k/4*TAU+time*.04,rr=p[2]*1.45;circle(p[0]+Math.cos(a)*rr,p[1]+Math.sin(a)*rr*.55,2+k%2,rgba(z.color,.55));}}for(let i=0;i<3;i++)for(let j=i+1;j<3;j++){const a=planets[i],b=planets[j];ctx.setLineDash([5,8]);line(a[0],a[1],b[0],b[1],rgba(z.color,.18),1.5);ctx.setLineDash([]);const p=fract(time*.055+(i+j)*.27);circle(mix(a[0],b[0],p),mix(a[1],b[1],p),2.2,rgba([255,245,205],.67));}ctx.font=`850 ${s*.023}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.57)';ctx.fillText('LA DISTANCIA CREA AUTONOMÍA',width*.5,height*.92);}
    function scenePlanetaryEngineering(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.52,r=s*.23;drawPlanet(cx,cy,r,z,time,true);ctx.strokeStyle=rgba(z.color,.42);ctx.lineWidth=s*.018;ctx.beginPath();ctx.ellipse(cx,cy,r*1.55,r*.55,time*.03,0,TAU);ctx.stroke();for(let i=0;i<9;i++){const a=i/9*TAU+time*.04,x=cx+Math.cos(a)*r*1.55,y=cy+Math.sin(a)*r*.55;polygon([[x-s*.018,y],[x+s*.018,y],[x+s*.028,y+s*.012],[x-s*.028,y+s*.012]],rgba([225,235,245],.58),rgba(z.color,.65),1);}for(let i=0;i<18;i++){const a=i/18*TAU+time*.012,rr=r*1.16,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;line(x,y,x+Math.cos(a)*s*.035,y+Math.sin(a)*s*.035,rgba(z.color,.28),2);}ctx.font=`900 ${s*.025}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.57)';ctx.fillText('CAPACIDAD ≠ DERECHO ≠ LEGITIMIDAD',cx,height*.92);}
    function scenePostBiological(z,time){const s=Math.min(width,height),cx=width*.5,cy=height*.5;drawNetwork(cx,cy,s*.36,z,time,28);for(let i=0;i<8;i++){const a=i/8*TAU+time*.035,rr=s*.27,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.7;ctx.strokeStyle=rgba(z.color,.5);ctx.strokeRect(x-s*.035,y-s*.035,s*.07,s*.07);circle(x-s*.013,y-s*.005,s*.005,'rgba(255,255,255,.75)');circle(x+s*.013,y-s*.005,s*.005,'rgba(255,255,255,.75)');line(x-s*.015,y+s*.017,x+s*.015,y+s*.017,rgba(z.color,.65),1.5);}for(let i=0;i<12;i++){const p=fract(time*.05+i*.08),a=i/12*TAU,x=cx+Math.cos(a)*s*(.08+p*.34),y=cy+Math.sin(a)*s*(.05+p*.24);circle(x,y,2,rgba([255,245,220],.5*(1-p)));}}
    function sceneInterstellar(z,time){const s=Math.min(width,height);for(let i=0;i<90;i++){const x=width*(.03+seeded(i+1200)*.94),y=height*(.04+seeded(i+1250)*.88),r=.5+seeded(i+1300)*2.2;circle(x,y,r,rgba(i%6?z.color:[255,235,180],.22+.4*seeded(i+1350)));}drawStar(width*.16,height*.25,s*.055,[255,215,120],time);drawStar(width*.84,height*.22,s*.038,[165,210,255],time);const x=width*.5,y=height*.58;polygon([[x-s*.18,y],[x+s*.16,y-s*.03],[x+s*.24,y],[x+s*.16,y+s*.03]],'rgba(205,225,240,.38)',rgba(z.color,.72),1.5);ctx.fillStyle=rgba(z.color,.18);ctx.fillRect(x-s*.14,y-s*.085,s*.26,s*.17);for(let i=0;i<5;i++)circle(x-s*.08+i*s*.05,y,2,'rgba(255,230,160,.7)');line(x-s*.2,y,width*.18,height*.28,rgba([255,140,120],.3),3);ctx.setLineDash([7,9]);line(width*.2,height*.28,width*.8,height*.24,rgba(z.color,.22),1.4);ctx.setLineDash([]);ctx.font=`900 ${s*.024}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.58)';ctx.fillText('AÑOS LUZ · GENERACIONES · MILENIOS',width*.5,height*.91);}
    function sceneKardashev(z,time){const s=Math.min(width,height);drawPlanet(width*.18,height*.69,s*.075,{color:[95,195,255]},time,true);drawStar(width*.5,height*.46,s*.12,[255,220,105],time);for(let i=0;i<26;i++){const a=i/26*TAU+time*.028,rr=s*(.18+(i%3)*.018),x=width*.5+Math.cos(a)*rr,y=height*.46+Math.sin(a)*rr*.58;polygon([[x-s*.012,y],[x+s*.012,y],[x+s*.018,y+s*.008],[x-s*.018,y+s*.008]],rgba(z.color,.5),rgba([255,255,255],.36),1);}for(let i=0;i<36;i++){const a=seeded(i+1700)*TAU,rr=s*(.23+seeded(i+1750)*.2),x=width*.78+Math.cos(a)*rr*.45,y=height*.65+Math.sin(a)*rr*.2;circle(x,y,1+i%3,rgba(i%5?z.color:[255,230,165],.42));}ctx.font=`900 ${s*.024}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.58)';ctx.fillText('PLANETA → ESTRELLA → GALAXIA',width*.5,height*.92);}
    function sceneDivergent(z,time){const s=Math.min(width,height),ox=width*.5,oy=height*.86;drawBranching(ox,oy,height*.16,z,time,11,.9);for(let i=0;i<11;i++){const x=width*(.05+i*.09),col=i%4===0?[120,245,160]:i%4===1?[255,120,135]:i%4===2?[145,180,255]:[255,215,120];softHalo(x,height*.15,s*.07,col,.12);circle(x,height*.15,s*(.012+(i%3)*.006),rgba(col,.65));}ctx.font=`900 ${s*.027}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.63)';ctx.fillText('NINGUNA RAMA ESTÁ GARANTIZADA',ox,height*.94);}
    function sceneUnknown(z,time){const s=Math.min(width,height),h=height*.36;const g=ctx.createLinearGradient(0,height,0,0);g.addColorStop(0,'rgba(8,12,28,.98)');g.addColorStop(.55,'rgba(55,60,105,.42)');g.addColorStop(1,'rgba(235,245,255,.24)');ctx.fillStyle=g;ctx.fillRect(0,0,width,height);softHalo(width*.5,h,s*.45,z.color,.15);for(let i=0;i<13;i++){const x=width*(.03+i/12*.94),a=Math.abs(i-6)/6;ctx.strokeStyle=rgba(z.color,.24*(1-a*.55));ctx.lineWidth=1.2+i%3;ctx.beginPath();ctx.moveTo(width*.5,height*.88);ctx.quadraticCurveTo(width*.5+(x-width*.5)*.35,height*.58,x,h);ctx.stroke();if(i%2===0)circle(x,h,2+i%3,rgba([255,255,255],.5));}for(let i=0;i<55;i++){const x=seeded(i+2200)*width,y=seeded(i+2250)*h,r=.6+seeded(i+2300)*2;circle(x,y,r,rgba(i%7?z.color:[255,225,170],.15+.36*seeded(i+2350)));}for(let i=0;i<5;i++){const a=time*.08+i*TAU/5,x=width*.5+Math.cos(a)*s*.16,y=h+Math.sin(a)*s*.06;ctx.strokeStyle=rgba(z.color,.16);ctx.beginPath();ctx.arc(x,y,s*(.025+i*.008),0,TAU);ctx.stroke();}ctx.font=`900 ${s*.025}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillText('MÁS ALLÁ: LA VIDA CÓSMICA',width*.5,height*.92);}

    const SCENES=[sceneFuturesStart,sceneEnergy,sceneAutomation,sceneAdvancedAI,sceneFutureBiotech,sceneHumanMachine,sceneSustainable,sceneInequality,sceneRisks,sceneGovernance,sceneSpaceIndustry,sceneSettlements,sceneMultiplanetary,scenePlanetaryEngineering,scenePostBiological,sceneInterstellar,sceneKardashev,sceneDivergent,sceneUnknown];

    function zoneWeight(progress,p0,p1,feather=.035){const enter=smooth(clamp((progress-(p0-feather))/feather,0,1)),exit=1-smooth(clamp((progress-p1)/feather,0,1));return enter*exit;}
    function drawScene(progress,time){for(const z of ZONES){const alpha=zoneWeight(progress,z.p0,z.p1,.016);if(alpha<.003)continue;ctx.save();ctx.globalAlpha=alpha;SCENES[z.scene](z,time);ctx.restore();}}
    function drawBursts(dt){for(let i=bursts.length-1;i>=0;i--){const p=bursts[i];p.life-=dt*p.decay;if(p.life<=0){bursts.splice(i,1);continue}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.94,dt*60);p.vy*=Math.pow(.94,dt*60);circle(p.x,p.y,p.r*(.5+p.life),rgba(p.color,p.life*.55));}for(let i=waves.length-1;i>=0;i--){const w=waves[i];w.life-=dt*1.05;if(w.life<=0){waves.splice(i,1);continue}w.radius+=dt*Math.min(width,height)*.24;ctx.strokeStyle=rgba(w.color,w.life*.25);ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(w.x,w.y,w.radius,0,TAU);ctx.stroke();}}

    function render(now){const dt=Math.min(.04,Math.max(.001,(now-lastFrame)/1000));lastFrame=now;elapsed+=reducedMotion?dt*.24:dt;pointerX+=(targetX-pointerX)*(1-Math.pow(.001,dt));pointerY+=(targetY-pointerY)*(1-Math.pow(.001,dt));currentProgress+=(depthFromY(pointerY)-currentProgress)*(1-Math.pow(.005,dt));shownX+=(pointerX*width-shownX)*(1-Math.pow(.001,dt));shownY+=(pointerY*height-shownY)*(1-Math.pow(.001,dt));touchEnergy*=Math.pow(.075,dt);
      drawBackground(currentProgress,elapsed);drawScene(currentProgress,elapsed);drawBursts(dt);if(!pointerDown)setAccent(zoneForDepth(currentProgress));requestAnimationFrame(render);}
    window.addEventListener('resize',resize,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(resize,120),{passive:true});document.addEventListener('visibilitychange',()=>{if(document.hidden&&audioCtx&&audioCtx.state==='running')audioCtx.suspend().catch(()=>{});});
    resize();setAccent(ZONES[0]);requestAnimationFrame(render);
  })();
</script>
