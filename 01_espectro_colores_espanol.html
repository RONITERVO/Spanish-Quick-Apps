<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Espectro de colores</title>
  <style>
    :root {
      --sample: rgb(255 255 255);
      --ink: rgb(255 255 255);
      --ring: rgb(255 255 255);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family:
        Inter, ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui,
        -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #spectrum {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #feedback {
      position: fixed;
      inset: 0;
      z-index: 4;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .sr-only {
      position: fixed;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #touch-orb {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 5;
      width: 42px;
      height: 42px;
      border: 3px solid var(--ring);
      border-radius: 999px;
      box-shadow:
        0 0 0 1px rgb(0 0 0 / 0.22),
        0 0 24px var(--ring),
        inset 0 0 14px rgb(255 255 255 / 0.32);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4);
      transition:
        opacity 130ms ease,
        transform 300ms cubic-bezier(.16, 1, .3, 1),
        border-color 90ms linear,
        box-shadow 90ms linear;
      will-change: transform, opacity;
    }

    #touch-orb.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .ripple {
      position: fixed;
      z-index: 3;
      width: 34px;
      height: 34px;
      border: 2px solid var(--ring);
      border-radius: 999px;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0.9;
      animation: ripple 700ms cubic-bezier(.16, 1, .3, 1) forwards;
    }

    @keyframes ripple {
      to {
        transform: translate(-50%, -50%) scale(4.8);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #touch-orb {
        transition-duration: 80ms;
      }

      .ripple {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="spectrum" aria-label="Espectro completo de colores"></canvas>
  <canvas id="feedback" aria-hidden="true"></canvas>
  <p id="color-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></p>

  <div id="touch-orb" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("spectrum");
      const ctx = canvas.getContext("2d", { alpha: false, willReadFrequently: true });
      const feedbackCanvas = document.getElementById("feedback");
      const feedbackCtx = feedbackCanvas.getContext("2d");
      const colorAnnouncer = document.getElementById("color-announcer");
      const touchOrb = document.getElementById("touch-orb");
      const root = document.documentElement;
      const floatingTexts = [];
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      let dpr = 1;
      let activePointer = null;
      let pendingPoint = null;
      let frameRequested = false;
      let feedbackFrame = 0;
      let lastFeedbackTime = performance.now();
      let settleTimer = 0;
      let pendingFeedback = null;
      let speechUnlocked = false;
      let speechTimer = 0;
      let lastSpoken = "";
      let hideTimer = 0;
      let lastRippleAt = 0;

      function drawSpectrum() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.max(1, Math.round(width * dpr));
        canvas.height = Math.max(1, Math.round(height * dpr));
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        feedbackCanvas.width = Math.max(1, Math.round(width * dpr));
        feedbackCanvas.height = Math.max(1, Math.round(height * dpr));
        feedbackCanvas.style.width = width + "px";
        feedbackCanvas.style.height = height + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        feedbackCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const hue = ctx.createLinearGradient(0, 0, width, 0);
        hue.addColorStop(0.000, "#ff0000");
        hue.addColorStop(0.167, "#ffff00");
        hue.addColorStop(0.333, "#00ff00");
        hue.addColorStop(0.500, "#00ffff");
        hue.addColorStop(0.667, "#0000ff");
        hue.addColorStop(0.833, "#ff00ff");
        hue.addColorStop(1.000, "#ff0000");
        ctx.fillStyle = hue;
        ctx.fillRect(0, 0, width, height);

        const light = ctx.createLinearGradient(0, 0, 0, height);
        light.addColorStop(0.000, "rgba(255,255,255,1)");
        light.addColorStop(0.485, "rgba(255,255,255,0)");
        light.addColorStop(0.515, "rgba(0,0,0,0)");
        light.addColorStop(1.000, "rgba(0,0,0,1)");
        ctx.fillStyle = light;
        ctx.fillRect(0, 0, width, height);
      }

      function showFloatingText(text, x, y, color = "#ffffff", stroke = "rgba(0,0,0,.78)", glow = color) {
        const life = reducedMotion.matches ? 0.72 : 1.05;
        floatingTexts.push({
          text,
          x: Math.max(74, Math.min(window.innerWidth - 74, x)),
          y: y < 130 ? y + 82 : y - 52,
          color,
          stroke,
          glow,
          life,
          maxLife: life,
          angle: (Math.random() - 0.5) * 0.055
        });
        if (!feedbackFrame) {
          lastFeedbackTime = performance.now();
          feedbackFrame = requestAnimationFrame(animateFloatingTexts);
        }
      }

      function clearFloatingTexts() {
        floatingTexts.length = 0;
        feedbackCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function queueSpeech(label) {
        if (!speechUnlocked || !("speechSynthesis" in window) || !label) return;
        clearTimeout(speechTimer);
        if (label === lastSpoken) return;
        speechTimer = window.setTimeout(() => {
          try {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(label);
            utterance.lang = "es-ES";
            utterance.rate = .86;
            utterance.pitch = 1;
            const voices = speechSynthesis.getVoices();
            const voice = voices.find(candidate => /^es(-|_)/i.test(candidate.lang)) ||
              voices.find(candidate => /spanish|español/i.test(candidate.name));
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
            lastSpoken = label;
          } catch (_) {}
        }, 360);
      }

      function flushFloatingFeedback() {
        clearTimeout(settleTimer);
        settleTimer = 0;
        if (!pendingFeedback) return;

        const feedback = pendingFeedback;
        pendingFeedback = null;
        showFloatingText(
          feedback.text,
          feedback.x,
          feedback.y,
          feedback.color,
          feedback.stroke,
          feedback.glow
        );
      }

      function scheduleFloatingFeedback(text, x, y, color, stroke, glow) {
        pendingFeedback = { text, x, y, color, stroke, glow };
        clearTimeout(settleTimer);
        clearFloatingTexts();
        settleTimer = window.setTimeout(flushFloatingFeedback, 220);
        queueSpeech(text);
      }

      function updateFloatingTexts(dt) {
        floatingTexts.forEach(text => {
          text.life -= dt;
          if (!reducedMotion.matches) text.y -= 42 * dt;
        });
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
          if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }
      }

      function drawFloatingTexts(drawCtx) {
        drawCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        floatingTexts.forEach(text => {
          const progress = 1 - text.life / text.maxLife;
          const alpha = Math.max(0, text.life / text.maxLife);
          const size = Math.min(72, Math.max(36, window.innerWidth * 0.065)) * (1 + progress * 0.14);

          drawCtx.save();
          drawCtx.translate(text.x, text.y);
          drawCtx.rotate(text.angle * (1 - progress * 0.35));
          drawCtx.globalAlpha = alpha;
          drawCtx.font = `bold ${size}px Caveat, "Segoe Print", "Bradley Hand", cursive`;
          drawCtx.textAlign = "center";
          drawCtx.textBaseline = "middle";
          drawCtx.lineJoin = "round";
          drawCtx.lineWidth = Math.max(4, size * 0.105);
          drawCtx.strokeStyle = text.stroke;
          drawCtx.shadowBlur = 20;
          drawCtx.shadowColor = text.glow;
          drawCtx.strokeText(text.text.toUpperCase(), 0, 0);
          drawCtx.fillStyle = text.color;
          drawCtx.fillText(text.text.toUpperCase(), 0, 0);
          drawCtx.restore();
        });
      }

      function animateFloatingTexts(now) {
        const dt = Math.min(0.033, (now - lastFeedbackTime) / 1000);
        lastFeedbackTime = now;
        updateFloatingTexts(dt);
        drawFloatingTexts(feedbackCtx);

        if (floatingTexts.length) {
          feedbackFrame = requestAnimationFrame(animateFloatingTexts);
        } else {
          feedbackFrame = 0;
        }
      }

      function rgbToHsl(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;

        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h = 0;
        let s = 0;
        const l = (max + min) / 2;
        const delta = max - min;

        if (delta !== 0) {
          s = delta / (1 - Math.abs(2 * l - 1));

          if (max === r) {
            h = 60 * (((g - b) / delta) % 6);
          } else if (max === g) {
            h = 60 * (((b - r) / delta) + 2);
          } else {
            h = 60 * (((r - g) / delta) + 4);
          }
        }

        if (h < 0) h += 360;
        return { h, s, l };
      }

      function spanishColorName(r, g, b) {
        const { h, s, l } = rgbToHsl(r, g, b);

        if (l <= 0.055) return "negro";
        if (l >= 0.965) return "blanco";

        if (s <= 0.09) {
          if (l < 0.28) return "gris oscuro";
          if (l > 0.76) return "gris claro";
          return "gris";
        }

        const redHue = h < 15 || h >= 345;

        if (redHue && l < 0.24 && s > 0.35) return "granate";
        if (h >= 18 && h < 48 && l < 0.36 && s > 0.32) return "marrón";
        if (h >= 32 && h < 58 && l > 0.76 && s < 0.72) return "beige";
        if (h >= 40 && h < 58 && l >= 0.38 && l <= 0.67 && s > 0.72) return "dorado";
        if (h >= 52 && h < 82 && l < 0.32) return "verde oliva";
        if (h >= 205 && h < 248 && l < 0.23) return "azul marino";
        if ((h >= 330 || h < 12) && l > 0.72) return "rosa";

        const palette = [
          [8,   "rojo"],
          [20,  "coral"],
          [38,  "naranja"],
          [52,  "ámbar"],
          [68,  "amarillo"],
          [92,  "verde lima"],
          [138, "verde"],
          [158, "esmeralda"],
          [178, "turquesa"],
          [198, "cian"],
          [218, "azul cielo"],
          [248, "azul"],
          [268, "añil"],
          [288, "violeta"],
          [310, "púrpura"],
          [330, "magenta"],
          [345, "rosa"],
          [360, "rojo"]
        ];

        let base = "rojo";
        for (const [limit, name] of palette) {
          if (h < limit) {
            base = name;
            break;
          }
        }

        if (l < 0.26) return base + " oscuro";
        if (l > 0.79 && s < 0.76) return base + " pálido";
        if (l > 0.72) return base + " claro";
        if (s < 0.38) return base + " apagado";
        return base;
      }

      function contrastFor(r, g, b) {
        const linear = [r, g, b].map(value => {
          const c = value / 255;
          return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        });

        const luminance =
          0.2126 * linear[0] +
          0.7152 * linear[1] +
          0.0722 * linear[2];

        return luminance > 0.43 ? "rgb(10 10 14)" : "rgb(255 255 255)";
      }

      function sampleAt(x, y) {
        const clampedX = Math.max(0, Math.min(window.innerWidth - 1, x));
        const clampedY = Math.max(0, Math.min(window.innerHeight - 1, y));
        const pixel = ctx.getImageData(
          Math.round(clampedX * dpr),
          Math.round(clampedY * dpr),
          1,
          1
        ).data;

        return { r: pixel[0], g: pixel[1], b: pixel[2], x: clampedX, y: clampedY };
      }

      function showColor(point, makeRipple = false) {
        const { r, g, b, x, y } = sampleAt(point.x, point.y);
        const sample = `rgb(${r} ${g} ${b})`;
        const ink = contrastFor(r, g, b);
        const lightInk = ink.includes("255");
        const name = spanishColorName(r, g, b);

        root.style.setProperty("--sample", sample);
        root.style.setProperty("--ink", ink);
        root.style.setProperty("--ring", ink);
        colorAnnouncer.textContent = name;
        touchOrb.style.left = x + "px";
        touchOrb.style.top = y + "px";

        touchOrb.classList.add("visible");

        scheduleFloatingFeedback(
          name,
          x,
          y,
          ink,
          lightInk ? "rgba(0,0,0,.78)" : "rgba(255,255,255,.9)",
          sample
        );

        if (makeRipple) createRipple(x, y);
      }

      function createRipple(x, y) {
        const now = performance.now();
        if (now - lastRippleAt < 90) return;
        lastRippleAt = now;

        const ripple = document.createElement("div");
        ripple.className = "ripple";
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        document.body.appendChild(ripple);
        ripple.addEventListener("animationend", () => ripple.remove(), { once: true });
      }

      function queueSample(x, y, ripple = false) {
        pendingPoint = { x, y, ripple };

        if (frameRequested) return;
        frameRequested = true;

        requestAnimationFrame(() => {
          frameRequested = false;
          if (!pendingPoint) return;

          const point = pendingPoint;
          pendingPoint = null;
          showColor(point, point.ripple);
        });
      }

      function hideSoon() {
        clearTimeout(hideTimer);
        hideTimer = window.setTimeout(() => {
          touchOrb.classList.remove("visible");
        }, 520);
      }

      canvas.addEventListener("pointerdown", event => {
        event.preventDefault();
        speechUnlocked = true;
        activePointer = event.pointerId;
        canvas.setPointerCapture?.(event.pointerId);
        clearTimeout(hideTimer);
        queueSample(event.clientX, event.clientY, true);
      });

      canvas.addEventListener("pointermove", event => {
        if (event.pointerId !== activePointer) return;
        event.preventDefault();
        queueSample(event.clientX, event.clientY, false);
      });

      function endPointer(event) {
        if (event.pointerId !== activePointer) return;
        activePointer = null;
        if (pendingPoint) {
          const point = pendingPoint;
          pendingPoint = null;
          showColor(point, false);
        }
        flushFloatingFeedback();
        hideSoon();
      }

      canvas.addEventListener("pointerup", endPointer);
      canvas.addEventListener("pointercancel", endPointer);
      canvas.addEventListener("lostpointercapture", () => {
        activePointer = null;
        flushFloatingFeedback();
        hideSoon();
      });

      window.addEventListener("resize", () => {
        drawSpectrum();
        clearTimeout(settleTimer);
        pendingFeedback = null;
        feedbackCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        floatingTexts.length = 0;
        touchOrb.classList.remove("visible");
      }, { passive: true });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) return;
        clearTimeout(speechTimer);
        if ("speechSynthesis" in window) speechSynthesis.cancel();
      });

      document.addEventListener("contextmenu", event => event.preventDefault());

      drawSpectrum();
    })();
  </script>
</body>
</html>
