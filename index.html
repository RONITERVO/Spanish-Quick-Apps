<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="25 experiencias táctiles para explorar conceptos en español.">
  <title>Espectros en Español</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050505;
    }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #app-feed {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overflow-anchor: none;
    }
    #app-feed::-webkit-scrollbar { display: none; }
    .app-slide {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background:
        radial-gradient(circle at 50% 42%, rgba(242, 168, 62, .13), transparent 38%),
        #050505;
    }
    .app-slide iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }
    .app-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 8px;
      padding: 32px;
      color: rgba(255,255,255,.84);
      text-align: center;
    }
    .app-placeholder strong { font-size: 18px; }
    .app-placeholder span { color: rgba(255,255,255,.52); font-size: 13px; }
    .app-slide iframe[data-loaded="true"] + .app-placeholder { display: none; }
    #feed-position {
      position: fixed;
      z-index: 20;
      top: max(12px, env(safe-area-inset-top));
      right: 14px;
      color: rgba(255,255,255,.7);
      font: 700 12px/1 system-ui, sans-serif;
      letter-spacing: .12em;
      text-shadow: 0 1px 5px #000;
      pointer-events: none;
      user-select: none;
    }
    #feed-scroll-hint {
      position: fixed;
      z-index: 21;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 18px));
      display: grid;
      place-items: center;
      gap: 2px;
      width: max-content;
      max-width: calc(100vw - 40px);
      color: rgba(255,255,255,.96);
      font-family: Caveat, "Segoe Print", "Comic Sans MS", cursive;
      font-size: clamp(20px, 5.5vw, 28px);
      font-weight: 700;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,.92), 0 0 14px rgba(0,0,0,.72);
      opacity: 0;
      transform: translate(-50%, 18px);
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: none;
      user-select: none;
    }
    #feed-scroll-hint.is-visible { opacity: 1; transform: translate(-50%, 0); }
    #feed-scroll-hint .feed-scroll-hint__chevrons {
      display: grid;
      height: 25px;
      font: 25px/13px Arial, sans-serif;
      animation: feed-hint-up 1.15s ease-in-out infinite;
    }
    #feed-scroll-hint[data-direction="down"] .feed-scroll-hint__chevrons {
      transform: rotate(180deg);
      animation-name: feed-hint-down;
    }
    @keyframes feed-hint-up {
      0%, 100% { translate: 0 5px; opacity: .55; }
      50% { translate: 0 -4px; opacity: 1; }
    }
    @keyframes feed-hint-down {
      0%, 100% { translate: 0 -5px; opacity: .55; }
      50% { translate: 0 4px; opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      #app-feed { scroll-behavior: auto; }
      #feed-scroll-hint,
      #feed-scroll-hint .feed-scroll-hint__chevrons { animation: none; transition-duration: .01ms; }
    }
  </style>
</head>
<body>
  <main id="app-feed" aria-label="Aplicaciones educativas"></main>
  <div id="feed-position" aria-live="polite">01 / 25</div>
  <div id="feed-scroll-hint" data-direction="up" aria-hidden="true">
    <span class="feed-scroll-hint__label">Desliza hacia arriba</span>
    <span class="feed-scroll-hint__chevrons">⌃<br>⌃</span>
  </div>
  <noscript>
    <p style="padding:2rem;color:white"><a href="01_espectro_colores_espanol.html">Abrir la primera aplicación</a></p>
  </noscript>
  <script>
    (() => {
      "use strict";
      const apps = [
        ["01_espectro_colores_espanol.html", "Colores"],
        ["02_espectro_musical_tactil.html", "Música"],
        ["03_espectro_tierra_profunda.html", "Tierra profunda"],
        ["04_espectro_sistema_solar_es_global.html", "Sistema solar"],
        ["05_espectro_via_lactea_es_global.html", "Vía Láctea"],
        ["06_espectro_grupo_local_es_global.html", "Grupo Local"],
        ["07_espectro_laniakea_es_global.html", "Laniakea"],
        ["08_espectro_red_cosmica_es_global.html", "Red cósmica"],
        ["09_espectro_universo_observable_es_global.html", "Universo observable"],
        ["10_espectro_universo_temprano_es_global.html", "Universo temprano"],
        ["11_espectro_evidencia_cosmica_es_global.html", "Evidencia cósmica"],
        ["12_espectro_futuro_universo_es_global.html", "Futuro del universo"],
        ["13_espectro_materia_energia_es_global.html", "Materia y energía"],
        ["14_espectro_espacio_tiempo_es_global.html", "Espacio-tiempo"],
        ["15_espectro_complejidad_es_global.html", "Complejidad"],
        ["16_espectro_vida_es_global.html", "Vida"],
        ["17_espectro_mente_es_global.html", "Mente"],
        ["18_espectro_cultura_es_global.html", "Cultura"],
        ["19_espectro_tecnologia_es_global.html", "Tecnología"],
        ["20_espectro_futuros_es_global.html", "Futuros"],
        ["21_espectro_vida_cosmica_es_global.html", "Vida cósmica"],
        ["22_espectro_contacto_cosmico_es_global.html", "Contacto cósmico"],
        ["23_espectro_perspectivas_cosmicas_es_global.html", "Perspectivas cósmicas"],
        ["24_espectro_significado_cosmico_es_global.html", "Significado cósmico"],
        ["25_espectro_horizonte_final_es_global.html", "Horizonte final"]
      ];
      const feed = document.getElementById("app-feed");
      const position = document.getElementById("feed-position");
      const feedHint = document.getElementById("feed-scroll-hint");
      const feedHintLabel = feedHint.querySelector(".feed-scroll-hint__label");
      const hashMatch = location.hash.match(/^#app-(\d{2})$/);
      let current = hashMatch ? Math.min(apps.length - 1, Math.max(0, Number(hashMatch[1]) - 1)) : 0;
      const initialIndex = current;
      let navigationLocked = false;
      let feedIdleTimer = 0;
      let feedHintHideTimer = 0;
      if ("scrollRestoration" in history) history.scrollRestoration = "manual";

      function hideFeedHint() {
        feedHint.classList.remove("is-visible");
        clearTimeout(feedHintHideTimer);
      }

      function scheduleFeedHint(delay = 6500) {
        clearTimeout(feedIdleTimer);
        feedIdleTimer = window.setTimeout(() => {
          if (document.hidden) return;
          feedHint.classList.add("is-visible");
          feedHintHideTimer = window.setTimeout(() => {
            hideFeedHint();
            scheduleFeedHint(10500);
          }, 4400);
        }, delay);
      }

      function resetFeedHint() {
        hideFeedHint();
        scheduleFeedHint();
      }

      const slides = apps.map(([file, title], index) => {
        const section = document.createElement("section");
        section.className = "app-slide";
        section.dataset.index = index;
        section.setAttribute("aria-label", `${String(index + 1).padStart(2, "0")}: ${title}`);
        const frame = document.createElement("iframe");
        frame.dataset.src = file;
        frame.title = title;
        frame.allow = "autoplay";
        const placeholder = document.createElement("div");
        placeholder.className = "app-placeholder";
        placeholder.innerHTML = `<strong>${title}</strong><span>Cargando espectro ${String(index + 1).padStart(2, "0")}…</span>`;
        section.append(frame, placeholder);
        feed.appendChild(section);
        return section;
      });
      const frames = slides.map(slide => slide.querySelector("iframe"));

      function loadFrame(index) {
        const frame = frames[index];
        if (!frame || frame.dataset.loaded === "true") return;
        frame.src = frame.dataset.src;
        frame.dataset.loaded = "true";
      }

      function keepNearby(index) {
        for (let i = Math.max(0, index - 1); i <= Math.min(apps.length - 1, index + 1); i++) loadFrame(i);
        frames.forEach((frame, frameIndex) => {
          if (Math.abs(frameIndex - index) <= 2 || frame.dataset.loaded !== "true") return;
          frame.removeAttribute("src");
          delete frame.dataset.loaded;
        });
      }

      function setCurrent(index) {
        if (index < 0 || index >= apps.length) return;
        current = index;
        keepNearby(current);
        const atEnd = current === apps.length - 1;
        feedHint.dataset.direction = atEnd ? "down" : "up";
        feedHintLabel.textContent = atEnd ? "Desliza hacia abajo para volver" : "Desliza hacia arriba";
        resetFeedHint();
        position.textContent = `${String(current + 1).padStart(2, "0")} / ${apps.length}`;
        document.title = `${apps[current][1]} · Espectros en Español`;
        history.replaceState(null, "", `#app-${String(current + 1).padStart(2, "0")}`);
      }

      function goTo(index, smooth = true) {
        if (index < 0 || index >= apps.length || navigationLocked) return;
        navigationLocked = true;
        keepNearby(index);
        slides[index].scrollIntoView({ behavior: smooth ? "smooth" : "auto", block: "start" });
        setCurrent(index);
        window.setTimeout(() => { navigationLocked = false; }, smooth ? 650 : 50);
      }

      const observer = new IntersectionObserver(entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (visible && visible.intersectionRatio >= .55) setCurrent(Number(visible.target.dataset.index));
      }, { root: feed, threshold: [.55, .75] });
      slides.forEach(slide => observer.observe(slide));

      window.addEventListener("message", event => {
        const sourceIndex = frames.findIndex(frame => frame.contentWindow === event.source);
        if (sourceIndex < 0 || !event.data || typeof event.data !== "object") return;
        if (event.data.type === "spectrum-feed:navigate") {
          const delta = event.data.delta === 1 ? 1 : event.data.delta === -1 ? -1 : 0;
          if (delta) goTo(sourceIndex + delta);
        } else if (event.data.type === "spectrum-feed:activity") {
          resetFeedHint();
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          clearTimeout(feedIdleTimer);
          hideFeedHint();
        } else {
          scheduleFeedHint();
        }
      });

      document.addEventListener("keydown", event => {
        if (!["PageDown", "PageUp", "Home", "End"].includes(event.key)) return;
        event.preventDefault();
        if (event.key === "Home") goTo(0);
        else if (event.key === "End") goTo(apps.length - 1);
        else goTo(current + (event.key === "PageDown" ? 1 : -1));
      });

      window.addEventListener("hashchange", () => {
        const match = location.hash.match(/^#app-(\d{2})$/);
        if (!match) return;
        const requested = Math.min(apps.length - 1, Math.max(0, Number(match[1]) - 1));
        if (requested !== current) goTo(requested, false);
      });

      keepNearby(initialIndex);
      setCurrent(initialIndex);
      feed.scrollTop = initialIndex * feed.clientHeight;
      requestAnimationFrame(() => goTo(initialIndex, false));
    })();
  </script>
</body>
</html>
